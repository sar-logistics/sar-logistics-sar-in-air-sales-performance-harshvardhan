/* ====================== HELPERS ====================== */
function fmtCur(v){
  var rate = state.currency==='THB'?32.5:1;
  var sym = state.currency==='THB'?'\u0E3F':'$';
  return sym + Math.round(v*rate).toLocaleString('en-US');
}
function initials(name){return name.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}
function sum(a){return a.reduce(function(x,y){return x+y;},0);}
function sparkOf(arr){
  var max=Math.max.apply(null,arr), min=Math.min.apply(null,arr);
  var W=104,H=30,pad=4;
  return arr.map(function(v,i){
    var x=pad+i*((W-2*pad)/(arr.length-1));
    var y=(H-pad)-((v-min)/((max-min)||1))*(H-2*pad);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
}
function heat(ratio){
  if(ratio>=1.05)return{bg:'#CFEBDD',color:'#0E6B45'};
  if(ratio>=0.85)return{bg:'#E3F5EA',color:'#15875A'};
  if(ratio>=0.6)return{bg:'#FBF1DA',color:'#946312'};
  if(ratio>=0.35)return{bg:'#FBE6D2',color:'#A85B17'};
  if(ratio>0)return{bg:'#FBDED9',color:'#B83A2B'};
  return{bg:'transparent',color:'#C7CEDA'};
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

/* ====================== DERIVED MODEL ====================== */
function model(){
  var gpGrand=sum(repsRaw.map(function(r){return sum(r.gp);}));
  var shipGrand=sum(repsRaw.map(function(r){return sum(r.ship);}));
  var tgtGrand=sum(repsRaw.map(function(r){return r.tgt*6;}));
  var achGrand=Math.round(gpGrand/tgtGrand*100);
  var teusGrand=sum(repsRaw.map(function(r){return sum(r.ship.map(function(s){return Math.round(s*2.6);}));}));
  return {gpGrand:gpGrand, shipGrand:shipGrand, tgtGrand:tgtGrand, achGrand:achGrand, teusGrand:teusGrand};
}

function grandEntity(){
  return {
    name:'Grand Total', initials:'GT', avatarBg:'oklch(0.5 0.14 262)',
    ship:months.map(function(_,i){return sum(repsRaw.map(function(r){return r.ship[i];}));}),
    gp:months.map(function(_,i){return sum(repsRaw.map(function(r){return r.gp[i];}));}),
    tank:months.map(function(_,i){return sum(repsRaw.map(function(r){return r.tank[i];}));}),
    tgt:sum(repsRaw.map(function(r){return r.tgt;}))
  };
}
function entities(){
  return [grandEntity()].concat(repsRaw.map(function(r){
    return {name:r.name, initials:initials(r.name), avatarBg:'oklch(0.6 0.12 '+r.hue+')', ship:r.ship, gp:r.gp, tank:r.tank, tgt:r.tgt};
  }));
}

/* ====================== DRILL-DOWN ====================== */
function genShipments(entity, metric, col){
  var routes=[['Bangkok','Los Angeles'],['Laem Chabang','Rotterdam'],['Bangkok','Hamburg'],['Map Ta Phut','Singapore'],['Bangkok','Jebel Ali'],['Laem Chabang','Shanghai'],['Bangkok','Sydney'],['Laem Chabang','Long Beach']];
  var modes=[{n:'FCL',c:'#2F6FED',b:'#EAF1FE'},{n:'LCL',c:'#138A6E',b:'#E3F4EF'},{n:'Air',c:'#7A4FC0',b:'#F1ECFB'},{n:'Tank',c:'#B26AC9',b:'#F7ECFB'}];
  var stats=[{n:'Delivered',c:'#15875A'},{n:'In transit',c:'#2F6FED'},{n:'Customs hold',c:'#C7891E'}];
  var seed=0, key=entity+metric+col;
  for(var i=0;i<key.length;i++) seed=(seed*31+key.charCodeAt(i))>>>0;
  function rnd(){seed=(seed*1664525+1013904223)>>>0;return seed/4294967296;}
  var n=4+Math.floor(rnd()*4), out=[];
  for(var j=0;j<n;j++){
    var r=routes[Math.floor(rnd()*routes.length)];
    var m=modes[Math.floor(rnd()*modes.length)];
    var s=stats[Math.floor(rnd()*stats.length)];
    var teus=1+Math.floor(rnd()*4);
    var gpRaw=700+Math.floor(rnd()*4300);
    out.push({jobNo:'SAR-26-'+(10000+Math.floor(rnd()*89999)), origin:r[0], dest:r[1], mode:m.n, modeColor:m.c, modeBg:m.b, teus:teus+' TEU', gpRaw:gpRaw, gpFmt:fmtCur(gpRaw), status:s.n, statusColor:s.c});
  }
  return out;
}

function buildSummaryCells(e, colLabels){
  var gpSeries=[sum(e.gp)].concat(e.gp);
  return gpSeries.map(function(v,i){
    var isFY=i===0, dash=!v;
    return {
      val:dash?'\u2014':fmtCur(v),
      color:dash?'#C7CEDA':'#059669',
      bg:isFY?'#FFFBF0':'transparent',
      borderLeft:isFY?'2px solid #F0D9A8':'0',
      weight:isFY?700:600,
      entity:e.name, metric:'Gross Profit', col:colLabels[i], drillVal:dash?fmtCur(0):fmtCur(v)
    };
  });
}
function buildCells(fy, monthVals, type, baseColor, entityName, metricLabel, colLabels){
  var series=[fy].concat(monthVals);
  return series.map(function(v,i){
    var val, color=baseColor, isDash=false;
    if(type==='int'){ if(v){val=v.toLocaleString('en-US');}else{val='\u2014';isDash=true;} }
    else if(type==='cur'){ val=fmtCur(v); }
    else if(type==='pct'){ val=v+'%'; color=v>=100?'#15875A':'#D64545'; }
    else { val='\u2014'; isDash=true; }
    if(isDash) color='#C7CEDA';
    var isFY=i===0;
    return {val:val, color:color, bg:isFY?'#FFFBF0':'transparent', borderLeft:isFY?'2px solid #F0D9A8':'0', weight:isFY?600:500, entity:entityName, metric:metricLabel, col:colLabels[i], drillVal:val};
  });
}

      var isOpen = isShip ? shipOpen : false;
      var arrowChar = isShip ? (isOpen ? '◄ ' : '► ') : '';
      return {type:'metric', label:label, padLeft:(52+indent*18)+'px', labelColor:color,
        labelWeight:indent?500:600, labelStyle:indent?'italic':'normal',
        caret:arrowChar, toggleType:toggleType||false, entityName:e.name,
        repInfo:repInfo||null,
        cells:buildCells(fy,vals,type,color,e.name,label,colLabels)};
    }
    rows.push(metric('Shipments',0,'int','#15233B',e.ship,sum(e.ship),'ship',{name:e.name,initials:e.initials,avatarBg:e.avatarBg,nameWeight:isGrand?700:600,groupBg:isGrand?'#F1F6FF':'#FCFDFF',achFmt:e.tgt>0?achFy+'%':'—',barWidth:Math.min(100,achFy)+'%',barColor:achFy>=100?'#15875A':achFy<50?'#E08A2B':'#2F6FED',achColor:achFy>=100?'#15875A':achFy<50?'#C26A12':'#2F6FED'}));
    if(shipOpen){
      rows.push(metric('Tons',1,'int','#2F6FED',teus,sum(teus),false));
      rows.push(metric('TEUs (Ocean)',1,'int','#5B8DEF',teus,sum(teus),false));
      rows.push(metric('LCL (Ocean in CBM)',1,'dash','#9AA4B2',lcl,0,false));
    }
    rows.push(metric('GP',0,'cur','#374151',e.gp,sum(e.gp),false));
    rows.push(metric('Target',0,'cur','#374151',tgtArr,e.tgt*6,false));
    rows.push(metric('Achievement %',0,'pct','#374151',achArr,achFy,false));
  });
  return rows;
}

function salesTable(M){
  var colLabels=['FY Total'].concat(months26);
  var head='<tr>'
    +'<th style="position:sticky;left:0;z-index:3;background:#F8FAFC;text-align:left;padding:6px 12px;font-size:10px;font-weight:700;letter-spacing:0.05em;color:#64748B;text-transform:uppercase;border-bottom:2px solid #CBD5E1;width:185px;min-width:185px;border-right:1px solid #E2E8F0;">Sales Rep</th><th style="position:sticky;left:185px;z-index:3;background:#F8FAFC;text-align:left;padding:6px 10px;font-size:10px;font-weight:700;letter-spacing:0.05em;color:#64748B;text-transform:uppercase;border-bottom:2px solid #CBD5E1;width:140px;min-width:140px;border-right:1px solid #E2E8F0;">Metric</th>'
    + colLabels.map(function(l,i){
      return '<th style="text-align:right;padding:6px 10px;font-size:10px;font-weight:700;letter-spacing:0.05em;color:'+(i===0?'#C7891E':'#64748B')+';text-transform:uppercase;border-bottom:2px solid #CBD5E1;background:'+(i===0?'#FFFBF0':'transparent')+';white-space:nowrap;">'+l+'</th>';
    }).join('')
  +'</tr>';

  var body=tableRows().map(function(row){
    if(row.type==='summary'){
      var cells=row.cells.map(function(c){
        return '<td class="dcell" data-act="drill" data-entity="'+esc(c.entity)+'" data-metric="'+esc(c.metric)+'" data-col="'+esc(c.col)+'" data-val="'+esc(c.drillVal)+'" style="text-align:right;padding:5px 10px;font-family:\'DM Mono\',monospace;font-size:11px;font-weight:'+c.weight+';color:'+c.color+';background:'+c.bg+';border-left:'+c.borderLeft+';white-space:nowrap;">'+c.val+'</td>';
      }).join('');
      return '<tr style="background:'+row.groupBg+';border-top:1px solid #E2E8F0;">'
        +'<td style="position:sticky;left:0;background:'+row.groupBg+';padding:10px 16px;z-index:2;border-right:1px solid #CBD5E1;width:185px;min-width:185px;">'
          +'<div style="display:flex;align-items:center;gap:10px;">'
            +'<div style="width:32px;height:32px;border-radius:50%;background:'+row.avatarBg+';color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+row.initials+'</div>'
            +'<div style="font-size:11.5px;font-weight:'+row.nameWeight+';white-space:nowrap;color:#15233B;">'+row.name+'</div>'
          +'</div>'
        +'</td>'
        +'<td style="position:sticky;left:185px;background:'+row.groupBg+';padding:5px 14px;z-index:2;border-right:1px solid #E7ECF3;width:140px;min-width:140px;"></td>'
        +cells
      +'</tr>';
    } else {
      var mcells=row.cells.map(function(c){
        return '<td class="dcell" data-act="drill" data-entity="'+esc(c.entity)+'" data-metric="'+esc(c.metric)+'" data-col="'+esc(c.col)+'" data-val="'+esc(c.drillVal)+'" style="text-align:right;padding:5px 10px;font-family:\'DM Mono\',monospace;font-size:11px;font-weight:'+c.weight+';color:'+c.color+';background:'+c.bg+';border-left:'+c.borderLeft+';white-space:nowrap;">'+c.val+'</td>';
      }).join('');
      var isShipRow = row.toggleType==='ship';
      var isTonsRow = row.toggleType==='tons';
      var isToggle  = isShipRow || isTonsRow;
      var rowBg = row.repInfo ? row.repInfo.groupBg : '#FFFFFF';
      // Small SVG arrow — 8px, consistent size
      var arrowSvg = row.caret.trim()==='◄'
        ? '<svg width="8" height="8" viewBox="0 0 8 8" fill="#2563EB"><polygon points="8,0 8,8 0,4"/></svg>'
        : '<svg width="8" height="8" viewBox="0 0 8 8" fill="#2563EB"><polygon points="0,0 8,4 0,8"/></svg>';
      var labelContent;
      if(isShipRow){
        // Shipments: blue bold 13px, no indent, small arrow
        labelContent = '<span style="display:flex;align-items:center;gap:5px;color:#2563EB;font-weight:600;font-size:11.5px;cursor:pointer;">'+arrowSvg+row.label+'</span>';
      } else if(row.label==='Tons'){
        // Total Tons: blue, no toggle, indented 16px
        labelContent = '<span style="color:#2563EB;font-weight:600;font-size:11px;">'+row.label+'</span>';
      } else if(row.labelStyle==='italic'){
        // LCL/Tons Air: grey italic 12px, indented 28px
        labelContent = '<span style="color:#94A3B8;font-size:11px;font-style:italic;font-weight:400;">'+row.label+'</span>';
      } else {
        // GP, Target, Achievement %: dark #374151, 13px normal
        labelContent = '<span style="color:#374151;font-size:11.5px;font-weight:500;">'+row.label+'</span>';
      }
      var actAttr = isShipRow ? ' data-act="shipToggle" data-name="'+esc(row.entityName)+'"' : '';
      var labelCell='<div style="display:flex;align-items:center;"'+actAttr+'>'+labelContent+'</div>';
      // All rows same padding: 8px vertical — tight uniform rows
      var cellPad = '5px 12px';
      var repBorder = row.repInfo ? 'border-top:2px solid #CBD5E1;' : 'border-top:1px solid #F1F5F9;';
      return '<tr style="background:'+rowBg+';border-bottom:1px solid #E2E8F0;'+repBorder+'">'
        +(row.repInfo
          ? '<td style="position:sticky;left:0;background:'+rowBg+';padding:'+cellPad+';z-index:2;border-right:1px solid #CBD5E1;width:185px;min-width:185px;"><div style="display:flex;align-items:center;gap:7px;"><div style="width:22px;height:22px;border-radius:50%;background:'+row.repInfo.avatarBg+';color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+row.repInfo.initials+'</div><div style="font-size:11.5px;font-weight:'+row.repInfo.nameWeight+';white-space:nowrap;color:#15233B;">'+row.repInfo.name+'</div></div></td>'
          : '<td style="position:sticky;left:0;background:'+rowBg+';padding:'+cellPad+';z-index:2;border-right:0;width:185px;min-width:185px;"></td>')
        +'<td style="position:sticky;left:185px;background:'+rowBg+';padding:5px 10px;white-space:nowrap;z-index:1;border-right:1px solid #CBD5E1;width:140px;min-width:140px;">'+labelCell+'</td>'
        +mcells
      +'</tr>';
    }
  }).join('');

  return '<div style="background:#FFFFFF;border:1px solid #CBD5E1;border-radius:12px;box-shadow:0 1px 3px rgba(20,35,59,0.08);overflow:hidden;">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #CBD5E1;flex-wrap:wrap;gap:12px;">'
      +'<div>'
        +'<span style="font-size:12.5px;font-weight:700;color:#15233B;">Sales Performance</span>'
        +'<span style="font-size:11px;color:#64748B;font-weight:500;margin-left:8px;">Monthly · '+state.currency+'</span>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:12px;">'
        +'<span style="font-size:12px;color:#94A3B8;font-weight:500;">Jan-26 – Jun-26</span>'
        +'<button class="btnq" style="display:flex;align-items:center;gap:6px;background:#EFF4FF;border:1px solid #BFDBFE;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;color:#2563EB;cursor:pointer;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Leaderboard</button>'
      +'</div>'
    +'</div>'
    +'<div style="overflow-x:auto;">'
      +'<table style="width:100%;border-collapse:collapse;min-width:850px;font-variant-numeric:tabular-nums;">'
        +'<thead style="background:#F1F5F9;">'+head+'</thead>'
        +'<tbody>'+body+'</tbody>'
      +'</table>'
    +'</div>'
  +'</div>';
}

/* ====================== DRILL DRAWER ====================== */
function drawer(){
  if(!state.drill) return '';
  var d=state.drill;
  var ships=d.shipments.map(function(s){
    return '<div class="shipcard" style="border:1px solid #EBEFF5;border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;"><span style="font-family:\'DM Mono\',monospace;font-size:12.5px;font-weight:500;color:#2F6FED;">'+s.jobNo+'</span><span style="font-size:11px;font-weight:700;color:'+s.modeColor+';background:'+s.modeBg+';border-radius:5px;padding:2px 7px;">'+s.mode+'</span></div>'
      +'<div style="display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#15233B;"><span>'+s.origin+'</span><svg width="14" height="9" viewBox="0 0 20 10" fill="none" stroke="#C2CAD6" stroke-width="1.6" stroke-linecap="round"><path d="M1 5h17M14 2l4 3-4 3"/></svg><span>'+s.dest+'</span></div>'
      +'<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:1px solid #F2F5F9;padding-top:8px;"><span style="display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:'+s.statusColor+';"><span style="width:6px;height:6px;border-radius:50%;background:'+s.statusColor+';display:inline-block;"></span>'+s.status+'</span><div style="display:flex;align-items:center;gap:12px;"><span style="font-size:11.5px;color:#97A1B2;font-weight:500;">'+s.teus+'</span><span style="font-family:\'DM Mono\',monospace;font-size:13px;font-weight:500;color:#15875A;">'+s.gpFmt+'</span></div></div>'
    +'</div>';
  }).join('');
  return '<div data-act="close" style="position:fixed;inset:0;background:rgba(15,23,40,0.34);z-index:50;display:flex;justify-content:flex-end;animation:ovFade 0.16s ease;">'
    +'<div data-stop="1" style="width:460px;max-width:92vw;height:100%;background:#FFFFFF;display:flex;flex-direction:column;box-shadow:-10px 0 36px rgba(15,23,40,0.14);animation:drwSlide 0.2s cubic-bezier(0.22,1,0.36,1);">'
      +'<div style="padding:20px 22px 16px;border-bottom:1px solid #F0F3F8;">'
        +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">'
          +'<div>'
            +'<div style="display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:0.05em;color:#97A1B2;text-transform:uppercase;"><span style="color:#2F6FED;">'+d.entity+'</span><span>·</span><span>'+d.metric+'</span><span>·</span><span>'+d.col+'</span></div>'
            +'<div style="font-family:\'DM Mono\',monospace;font-size:24px;font-weight:500;color:#15233B;margin-top:7px;letter-spacing:-0.02em;">'+d.valueFmt+'</div>'
            +'<div style="font-size:11.5px;color:#97A1B2;font-weight:500;margin-top:2px;">'+d.count+' shipments contributing</div>'
          +'</div>'
          +'<button data-act="close" style="border:none;background:#F4F7FB;width:32px;height:32px;border-radius:8px;cursor:pointer;color:#5B6678;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">✕</button>'
        +'</div>'
      +'</div>'
      +'<div style="flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;">'+ships+'</div>'
      +'<div style="padding:14px 22px;border-top:1px solid #F0F3F8;display:flex;align-items:center;justify-content:space-between;background:#FAFBFD;"><span style="font-size:12.5px;font-weight:600;color:#5B6678;">Total GP in view</span><span style="font-family:\'DM Mono\',monospace;font-size:15px;font-weight:500;color:#15875A;">'+d.totalFmt+'</span></div>'
    +'</div>'
  +'</div>';
}

/* ====================== RENDER ====================== */
function render(){
  var M=model();
  // Save scroll position before re-render
  var mainEl = document.querySelector('main');
  var scrollTop = mainEl ? mainEl.scrollTop : 0;
  document.getElementById('app').innerHTML =
    sidebar()
    +'<div style="flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden;">'
      +topbar()
      +'<main style="flex:1;overflow-y:auto;padding:10px 14px 20px;">'
        +kpiRow(M)
        +salesTable(M)
      +'</main>'
    +'</div>'
    +drawer();
  // Restore scroll position after re-render
  var newMain = document.querySelector('main');
  if(newMain && scrollTop) newMain.scrollTop = scrollTop;
}

function openDrill(entity, metric, col, valueFmt){
  var ships=genShipments(entity,metric,col);
  var total=sum(ships.map(function(s){return s.gpRaw;}));
  state.drill={entity:entity, metric:metric, col:col, valueFmt:valueFmt, shipments:ships, totalFmt:fmtCur(total), count:ships.length};
  render();
}

document.addEventListener('click', function(ev){
  var el=ev.target.closest('[data-act]');
  if(!el) return;
  var act=el.getAttribute('data-act');
  if(act==='cur'){ state.currency=el.getAttribute('data-cur'); render(); }
  else if(act==='shipToggle'){ ev.stopPropagation(); var n=el.getAttribute('data-name'); state.shipOpen[n]=!state.shipOpen[n]; render(); }
  else if(act==='drill'){ ev.stopPropagation(); openDrill(el.getAttribute('data-entity'),el.getAttribute('data-metric'),el.getAttribute('data-col'),el.getAttribute('data-val')); }
  else if(act==='close'){ if(ev.target.closest('[data-stop]') && !el.matches('[data-act="close"]')) return; state.drill=null; render(); }
});
document.addEventListener('keydown', function(e){ if(e.key==='Escape' && state.drill){ state.drill=null; render(); }});

render();
</script>
