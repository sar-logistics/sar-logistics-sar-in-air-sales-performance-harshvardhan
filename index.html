  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

}};color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;\">{{ row.initials }}<\u002Fdiv>\n                          <div style=\"min-width:0;\">\n                            <div style=\"font-size:13.5px;font-weight:{{ row.nameWeight }};color:#15233B;white-space:nowrap;\">{{ row.name }}<\u002Fdiv>\n                            <div style=\"display:flex;align-items:center;gap:7px;margin-top:2px;\">\n                              <svg width=\"58\" height=\"16\" viewBox=\"0 0 104 30\" preserveAspectRatio=\"none\" style=\"overflow:visible;flex-shrink:0;\">\n                                <polyline points=\"{{ row.sparkPoints }}\" fill=\"none\" stroke=\"{{ row.sparkColor }}\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline>\n                              <\u002Fsvg>\n                              <span style=\"font-size:11px;font-weight:600;color:{{ row.trendColor }};white-space:nowrap;display:flex;align-items:center;gap:3px;\"><span style=\"font-size:8px;\">{{ row.trendChar }}<\u002Fspan>{{ row.trendFmt }}<\u002Fspan>\n                            <\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Ftd>\n                      <td onclick=\"{{ cell.onClick }}\" style=\"text-align:right;padding:11px 14px;font-family:'DM Mono',monospace;font-size:13px;font-weight:{{ cell.weight }};color:{{ cell.color }};background:{{ cell.bg }};cursor:pointer;white-space:nowrap;border-left:{{ cell.borderLeft }};\" style-hover=\"filter:brightness(0.95);\">{{ cell.val }}<\u002Ftd>\n                      \n                      <td style=\"padding:11px 18px;\">\n                        <div style=\"display:flex;align-items:center;gap:10px;\">\n                          <div style=\"flex:1;height:8px;border-radius:99px;background:#E7ECF3;overflow:hidden;min-width:58px;\">\n                            <div style=\"height:100%;border-radius:99px;width:{{ row.barWidth }};background:{{ row.barColor }};\"><\u002Fdiv>\n                          <\u002Fdiv>\n                          <span style=\"font-family:'DM Mono',monospace;font-size:12.5px;font-weight:500;color:{{ row.achColor }};white-space:nowrap;width:42px;text-align:right;\">{{ row.achFmt }}<\u002Fspan>\n                        <\u002Fdiv>\n                      <\u002Ftd>\n                    <\u002Ftr>\n                  \n                  <tr style=\"border-bottom:1px solid #F4F6FA;background:#FCFDFF;\">\n                      <td style=\"position:sticky;left:0;background:#FCFDFF;padding:8px 22px 8px {{ row.padLeft }};white-space:nowrap;z-index:1;border-right:1px solid #EEF1F6;\">\n                        <div onclick=\"{{ row.onToggle }}\" style=\"display:flex;align-items:center;gap:7px;cursor:{{ row.labelCursor }};\">\n                          <span style=\"font-size:9px;color:#8B97A8;width:10px;display:inline-block;\">{{ row.caret }}<\u002Fspan>\n                          <span style=\"font-size:12px;font-weight:{{ row.labelWeight }};color:{{ row.labelColor }};font-style:{{ row.labelStyle }};\">{{ row.label }}<\u002Fspan>\n                        <\u002Fdiv>\n                      <\u002Ftd>\n                      <td onclick=\"{{ cell.onClick }}\" style=\"text-align:right;padding:8px 14px;font-family:'DM Mono',monospace;font-size:12.5px;font-weight:{{ cell.weight }};color:{{ cell.color }};background:{{ cell.bg }};cursor:pointer;white-space:nowrap;border-left:{{ cell.borderLeft }};\" style-hover=\"background:#E9F1FF;\">{{ cell.val }}<\u002Ftd>\n                      \n                      <td style=\"background:#FCFDFF;\"><\u002Ftd>\n                    <\u002Ftr>\n                  \n                \n              <\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <!-- ============ DRILL-DOWN DRAWER ============ -->\n  <sc-if value=\"{{ drillOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeDrill }}\" style=\"position:fixed;inset:0;background:rgba(15,23,40,0.34);z-index:50;display:flex;justify-content:flex-end;animation:ovFade 0.16s ease;\">\n      <div onclick=\"{{ drillStop }}\" style=\"width:472px;max-width:92vw;height:100%;background:#FFFFFF;display:flex;flex-direction:column;box-shadow:-12px 0 40px rgba(15,23,40,0.16);animation:drwSlide 0.22s cubic-bezier(0.22,1,0.36,1);\">\n        <div style=\"padding:22px 24px 18px 24px;border-bottom:1px solid #F0F3F8;\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px;\">\n            <div>\n              <div style=\"display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:700;letter-spacing:0.04em;color:#97A1B2;text-transform:uppercase;\">\n                <span style=\"color:#2F6FED;\">{{ drill.entity }}<\u002Fspan><span>·<\u002Fspan><span>{{ drill.metric }}<\u002Fspan><span>·<\u002Fspan><span>{{ drill.col }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-family:'DM Mono',monospace;font-size:26px;font-weight:500;color:#15233B;margin-top:8px;letter-spacing:-0.02em;\">{{ drill.valueFmt }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#97A1B2;font-weight:500;margin-top:3px;\">{{ drill.count }} shipments contributing<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ closeDrill }}\" style=\"border:none;background:#F4F7FB;width:34px;height:34px;border-radius:9px;cursor:pointer;color:#5B6678;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;\" style-hover=\"background:#E7ECF3;\">✕<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:9px;\">\n          <sc-for list=\"{{ drill.shipments }}\" as=\"s\" hint-placeholder-count=\"5\">\n            <div style=\"border:1px solid #EBEFF5;border-radius:12px;padding:13px 15px;display:flex;flex-direction:column;gap:9px;\" style-hover=\"border-color:#C9D4E2;background:#FCFDFF;\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;\">\n                <span style=\"font-family:'DM Mono',monospace;font-size:12.5px;font-weight:500;color:#2F6FED;\">{{ s.jobNo }}<\u002Fspan>\n                <span style=\"font-size:11px;font-weight:700;color:{{ s.modeColor }};background:{{ s.modeBg }};border-radius:6px;padding:3px 8px;\">{{ s.mode }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#15233B;\">\n                <span>{{ s.origin }}<\u002Fspan>\n                <svg width=\"15\" height=\"10\" viewBox=\"0 0 20 10\" fill=\"none\" stroke=\"#C2CAD6\" stroke-width=\"1.6\" stroke-linecap=\"round\"><path d=\"M1 5h17M14 2l4 3-4 3\"><\u002Fpath><\u002Fsvg>\n                <span>{{ s.dest }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:1px solid #F2F5F9;padding-top:9px;\">\n                <span style=\"display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:{{ s.statusColor }};\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ s.statusColor }};\"><\u002Fspan>{{ s.status }}<\u002Fspan>\n                <div style=\"display:flex;align-items:center;gap:14px;\">\n                  <span style=\"font-size:11.5px;color:#97A1B2;font-weight:500;\">{{ s.teus }}<\u002Fspan>\n                  <span style=\"font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:#15875A;\">{{ s.gpFmt }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"padding:16px 24px;border-top:1px solid #F0F3F8;display:flex;align-items:center;justify-content:space-between;background:#FAFBFD;\">\n          <span style=\"font-size:12.5px;font-weight:600;color:#5B6678;\">Total GP in view<\u002Fspan>\n          <span style=\"font-family:'DM Mono',monospace;font-size:16px;font-weight:500;color:#15875A;\">{{ drill.totalFmt }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { view: 'overview', currency: 'USD', expanded: {}, teusOpen: {}, drill: null };\n\n  months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];\n\n  repsRaw = [\n    { name: 'Maria Delgado',  hue: 255, gp: [15400, 12800, 18200, 16900, 21300, 19500], ship: [9, 8, 11, 10, 13, 12], tank: [0, 0, 0, 0, 2, 0], tgt: 16000 },\n    { name: 'Anchalee Dubey', hue: 215, gp: [5330, 7250, 21540, 17360, 15930, 14600],   ship: [4, 5, 14, 8, 8, 9],   tank: [0, 0, 3, 0, 0, 0], tgt: 14000 },\n    { name: 'Kiran Humbre',   hue: 165, gp: [9200, 11300, 8700, 12400, 10100, 13600],   ship: [6, 7, 5, 8, 6, 9],    tank: [0, 0, 0, 0, 0, 0], tgt: 11000 },\n    { name: 'Genesis Montes', hue: 300, gp: [13640, 4200, 1540, 8350, 6420, 9180],      ship: [3, 2, 1, 2, 2, 3],    tank: [0, 0, 0, 0, 0, 0], tgt: 9000 },\n    { name: 'Somchai Patana', hue: 30,  gp: [4200, 6800, 9100, 5400, 7700, 8300],       ship: [3, 5, 6, 4, 5, 6],    tank: [0, 0, 0, 0, 0, 0], tgt: 8000 },\n    { name: 'Wei Chen',       hue: 145, gp: [3100, 4500, 5200, 6100, 4800, 5500],       ship: [2, 3, 4, 4, 3, 4],    tank: [0, 1, 0, 0, 0, 0], tgt: 6000 },\n  ];\n\n  fmtCur(v) {\n    const rate = this.state.currency === 'THB' ? 32.5 : 1;\n    const sym = this.state.currency === 'THB' ? '\\u0E3F' : '$';\n    return sym + Math.round(v * rate).toLocaleString('en-US');\n  }\n  compact(v) {\n    const rate = this.state.currency === 'THB' ? 32.5 : 1;\n    const sym = this.state.currency === 'THB' ? '\\u0E3F' : '$';\n    const n = v * rate;\n    if (n >= 1000) { const k = n / 1000; return sym + (k >= 100 ? Math.round(k) : (Math.round(k * 10) / 10)) + 'k'; }\n    return sym + Math.round(n);\n  }\n  initials(name) { return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase(); }\n  seg(active) {\n    return active\n      ? { bg: '#FFFFFF', color: '#15233B', shadow: '0 1px 2px rgba(20,35,59,0.14)' }\n      : { bg: 'transparent', color: '#6A7689', shadow: 'none' };\n  }\n  sparkOf(arr) {\n    const max = Math.max(...arr), min = Math.min(...arr);\n    const W = 104, H = 30, pad = 4;\n    return arr.map((v, i) => {\n      const x = pad + i * ((W - 2 * pad) / (arr.length - 1));\n      const y = (H - pad) - ((v - min) / ((max - min) || 1)) * (H - 2 * pad);\n      return x.toFixed(1) + ',' + y.toFixed(1);\n    }).join(' ');\n  }\n\n  openDrill(entity, metric, col, valueFmt) {\n    const ships = this.genShipments(entity, metric, col);\n    const total = ships.reduce((a, s) => a + s.gpRaw, 0);\n    this.setState({ drill: { entity, metric, col, valueFmt, shipments: ships, totalFmt: this.fmtCur(total), count: ships.length } });\n  }\n  genShipments(entity, metric, col) {\n    const routes = [['Bangkok', 'Los Angeles'], ['Laem Chabang', 'Rotterdam'], ['Bangkok', 'Hamburg'], ['Map Ta Phut', 'Singapore'], ['Bangkok', 'Jebel Ali'], ['Laem Chabang', 'Shanghai'], ['Bangkok', 'Sydney'], ['Laem Chabang', 'Long Beach']];\n    const modes = [{ n: 'FCL', c: '#2F6FED', b: '#EAF1FE' }, { n: 'LCL', c: '#138A6E', b: '#E3F4EF' }, { n: 'Air', c: '#7A4FC0', b: '#F1ECFB' }, { n: 'Tank', c: '#B26AC9', b: '#F7ECFB' }];\n    const stats = [{ n: 'Delivered', c: '#15875A' }, { n: 'In transit', c: '#2F6FED' }, { n: 'Customs hold', c: '#C7891E' }];\n    let seed = 0; const key = entity + metric + col;\n    for (let i = 0; i < key.length; i++) seed = (seed * 31 + key.charCodeAt(i)) >>> 0;\n    const rnd = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; };\n    const n = 4 + Math.floor(rnd() * 4);\n    const out = [];\n    for (let i = 0; i < n; i++) {\n      const r = routes[Math.floor(rnd() * routes.length)];\n      const m = modes[Math.floor(rnd() * modes.length)];\n      const s = stats[Math.floor(rnd() * stats.length)];\n      const teus = 1 + Math.floor(rnd() * 4);\n      const gpRaw = 700 + Math.floor(rnd() * 4300);\n      out.push({ jobNo: 'SAR-26-' + (10000 + Math.floor(rnd() * 89999)), origin: r[0], dest: r[1], mode: m.n, modeColor: m.c, modeBg: m.b, teus: teus + ' TEU', gpRaw, gpFmt: this.fmtCur(gpRaw), status: s.n, statusColor: s.c });\n    }\n    return out;\n  }\n\n  renderVals() {\n    const setState = this.setState.bind(this);\n    const isOverview = this.state.view === 'overview';\n    const isTable = this.state.view === 'table';\n    const months = this.months;\n    const months26 = months.map(m => m + '-26');\n\n    // ---------- Overview cards data ----------\n    const reps = this.repsRaw.map(r => {\n      const gpTotal = r.gp.reduce((a, b) => a + b, 0);\n      const shipTotal = r.ship.reduce((a, b) => a + b, 0);\n      const tgtTotal = r.tgt * 6;\n      const ach = gpTotal / tgtTotal;\n      const achPct = Math.round(ach * 100);\n      const last = r.gp[5], prev = r.gp[4];\n      const momPct = prev ? Math.round((last - prev) / prev * 100) : 0;\n      return {\n        name: r.name, gpTotal, shipTotal,\n        initials: this.initials(r.name),\n        avatarBg: 'oklch(0.6 0.12 ' + r.hue + ')',\n        gpTotalFmt: this.fmtCur(gpTotal),\n        tgtTotalFmt: this.fmtCur(tgtTotal),\n        achFmt: achPct + '%',\n        barWidth: Math.min(100, achPct) + '%',\n        barColor: ach >= 1 ? '#15875A' : ach < 0.5 ? '#E08A2B' : '#2F6FED',\n        achColor: ach >= 1 ? '#15875A' : ach < 0.5 ? '#C26A12' : '#2F6FED',\n        sparkPoints: this.sparkOf(r.gp),\n        sparkColor: last >= prev ? '#1FAE6A' : '#D64545',\n        trendChar: last > prev ? '\\u25B2' : last < prev ? '\\u25BC' : '\\u2014',\n        trendColor: last > prev ? '#15875A' : last < prev ? '#D64545' : '#97A1B2',\n        trendFmt: (momPct > 0 ? '+' : '') + momPct + '% vs last mo',\n      };\n    });\n    const ranked = [...reps].sort((a, b) => b.gpTotal - a.gpTotal).map((r, i) => ({\n      ...r, rankFmt: '#' + (i + 1),\n      rankColor: i === 0 ? '#B7791F' : '#7C8696',\n      rankBg: i === 0 ? '#FBF3DE' : '#F1F4F9',\n      cardBg: i === 0 ? '#FCFBF6' : '#FFFFFF',\n    }));\n\n    // ---------- grand totals + KPIs ----------\n    const gpGrand = reps.reduce((a, r) => a + r.gpTotal, 0);\n    const shipGrand = reps.reduce((a, r) => a + r.shipTotal, 0);\n    const tgtGrand = this.repsRaw.reduce((a, r) => a + r.tgt * 6, 0);\n    const achGrand = Math.round(gpGrand / tgtGrand * 100);\n    const teusGrand = this.repsRaw.reduce((a, r) => a + r.ship.reduce((x, s) => x + Math.round(s * 2.6), 0), 0);\n\n    const up = { color: '#15875A', bg: '#E6F4EC' };\n    const flat = { color: '#8A93A2', bg: '#F1F4F9' };\n    const kpis = [\n      { glyph: '\\u2691', iconBg: '#EAF1FE', iconColor: '#2F6FED', label: 'Total Shipments', value: String(shipGrand), sub: 'vs prev period', valueColor: '#15233B', hasDelta: true, deltaFmt: '\\u25B2 8.5%', deltaColor: up.color, deltaBg: up.bg },\n      { glyph: '\\u25A6', iconBg: '#E9F2FB', iconColor: '#2D7BC0', label: 'Total TEUs', value: String(teusGrand), sub: 'vs prev period', valueColor: '#15233B', hasDelta: true, deltaFmt: '\\u25B2 6.1%', deltaColor: up.color, deltaBg: up.bg },\n      { glyph: '\\u2708', iconBg: '#F0F1FA', iconColor: '#5B62C4', label: 'Tons (Air)', value: '\\u2014', sub: 'Chargeable wt', valueColor: '#C2C9D4', hasDelta: false },\n      { glyph: '$', iconBg: '#E6F4EC', iconColor: '#15875A', label: 'Gross Profit', value: this.fmtCur(gpGrand), sub: 'vs prev period', valueColor: '#15875A', hasDelta: true, deltaFmt: '\\u25B2 14.2%', deltaColor: up.color, deltaBg: up.bg },\n      { glyph: '\\u25CE', iconBg: '#FBF1E2', iconColor: '#C7891E', label: 'GP Target', value: this.fmtCur(tgtGrand), sub: 'Monthly avg ' + this.fmtCur(tgtGrand / 6), valueColor: '#15233B', hasDelta: true, deltaFmt: '\\u2014 0.0%', deltaColor: flat.color, deltaBg: flat.bg },\n      { glyph: '%', iconBg: '#F2ECFB', iconColor: '#7A4FC0', label: 'Achievement', value: achGrand + '%', sub: 'vs prev period', valueColor: achGrand >= 100 ? '#15875A' : achGrand < 50 ? '#C26A12' : '#2F6FED', hasDelta: true, deltaFmt: '\\u25B2 3.4 pts', deltaColor: up.color, deltaBg: up.bg },\n    ];\n\n    // ---------- detailed table / scorecard ----------\n    const grand = {\n      name: 'Grand Total', initials: 'GT', avatarBg: 'oklch(0.5 0.14 262)',\n      ship: months.map((_, i) => this.repsRaw.reduce((a, r) => a + r.ship[i], 0)),\n      gp: months.map((_, i) => this.repsRaw.reduce((a, r) => a + r.gp[i], 0)),\n      tank: months.map((_, i) => this.repsRaw.reduce((a, r) => a + r.tank[i], 0)),\n      tgt: this.repsRaw.reduce((a, r) => a + r.tgt, 0),\n    };\n    const entities = [grand, ...this.repsRaw.map(r => ({ name: r.name, initials: this.initials(r.name), avatarBg: 'oklch(0.6 0.12 ' + r.hue + ')', ship: r.ship, gp: r.gp, tank: r.tank, tgt: r.tgt }))];\n\n    const colLabels = ['FY Total', ...months26];\n    const headerCols = colLabels.map((l, i) => ({ label: l, color: i === 0 ? '#C7891E' : '#97A1B2', bg: i === 0 ? '#FFFBF0' : 'transparent' }));\n\n    const sum = a => a.reduce((x, y) => x + y, 0);\n\n    // heatmap: GP vs target ratio -> soft tint + readable text\n    const heat = (ratio) => {\n      if (ratio >= 1.05) return { bg: '#CFEBDD', color: '#0E6B45' };\n      if (ratio >= 0.85) return { bg: '#E3F5EA', color: '#15875A' };\n      if (ratio >= 0.6) return { bg: '#FBF1DA', color: '#946312' };\n      if (ratio >= 0.35) return { bg: '#FBE6D2', color: '#A85B17' };\n      if (ratio > 0) return { bg: '#FBDED9', color: '#B83A2B' };\n      return { bg: 'transparent', color: '#C7CEDA' };\n    };\n\n    // GP figures cell array for a metric row (FY + 6 months)\n    const buildCells = (fy, monthVals, type, baseColor, entityName, metricLabel) => {\n      const series = [fy, ...monthVals];\n      return series.map((v, i) => {\n        let val, color = baseColor, isDash = false;\n        if (type === 'int') { if (v) { val = v.toLocaleString('en-US'); } else { val = '\\u2014'; isDash = true; } }\n        else if (type === 'cur') { val = this.fmtCur(v); }\n        else if (type === 'pct') { val = v + '%'; color = v >= 100 ? '#15875A' : '#D64545'; }\n        else { val = '\\u2014'; isDash = true; }\n        if (isDash) color = '#C7CEDA';\n        const isFY = i === 0;\n        return {\n          val, color,\n          bg: isFY ? '#FFFBF0' : 'transparent',\n          borderLeft: isFY ? '2px solid #F0D9A8' : '0',\n          weight: isFY ? 600 : 500,\n          onClick: () => this.openDrill(entityName, metricLabel, colLabels[i], val),\n        };\n      });\n    };\n\n    // heatmapped GP cells for the always-visible scorecard summary row\n    const buildSummaryCells = (e) => {\n      const tgtSeries = [e.tgt * 6, ...months.map(() => e.tgt)];\n      const gpSeries = [sum(e.gp), ...e.gp];\n      return gpSeries.map((v, i) => {\n        const isFY = i === 0;\n        const ratio = tgtSeries[i] ? v / tgtSeries[i] : 0;\n        const h = heat(ratio);\n        const dash = !v;\n        return {\n          val: dash ? '\\u2014' : this.fmtCur(v),\n          color: dash ? '#C7CEDA' : (isFY ? '#15233B' : h.color),\n          bg: isFY ? '#FFFBF0' : h.bg,\n          borderLeft: isFY ? '2px solid #F0D9A8' : '0',\n          weight: isFY ? 700 : 600,\n          onClick: () => this.openDrill(e.name, 'Gross Profit', colLabels[i], dash ? this.fmtCur(0) : this.fmtCur(v)),\n        };\n      });\n    };\n\n    const rows = [];\n    entities.forEach((e, ei) => {\n      const isGrand = ei === 0;\n      const expanded = this.state.expanded[e.name] === true;\n      const teusOpen = this.state.teusOpen[e.name] !== false;\n      const achFy = Math.round(sum(e.gp) / (e.tgt * 6) * 100);\n      const last = e.gp[5], prev = e.gp[4];\n      const momPct = prev ? Math.round((last - prev) / prev * 100) : 0;\n\n      // always-visible scorecard summary row\n      rows.push({\n        isSummary: true, isMetric: false,\n        name: e.name, initials: e.initials, avatarBg: e.avatarBg,\n        nameWeight: isGrand ? 700 : 600,\n        groupBg: isGrand ? '#F1F6FF' : '#FFFFFF',\n        caret: expanded ? '\\u25BE' : '\\u25B8',\n        sparkPoints: this.sparkOf(e.gp),\n        sparkColor: last >= prev ? '#1FAE6A' : '#D64545',\n        trendChar: last > prev ? '\\u25B2' : last < prev ? '\\u25BC' : '\\u2014',\n        trendColor: last > prev ? '#15875A' : last < prev ? '#D64545' : '#97A1B2',\n        trendFmt: (momPct > 0 ? '+' : '') + momPct + '%',\n        cells: buildSummaryCells(e),\n        barWidth: Math.min(100, achFy) + '%',\n        barColor: achFy >= 100 ? '#15875A' : achFy < 50 ? '#E08A2B' : '#2F6FED',\n        achColor: achFy >= 100 ? '#15875A' : achFy < 50 ? '#C26A12' : '#2F6FED',\n        achFmt: achFy + '%',\n        onToggle: () => setState(s => ({ expanded: { ...s.expanded, [e.name]: !s.expanded[e.name] } })),\n      });\n\n      if (!expanded) return;\n\n      const teus = e.ship.map(s => Math.round(s * 2.6));\n      const fcl = teus.map((t, i) => t - e.tank[i]);\n      const lcl = months.map(() => 0);\n      const tons = months.map(() => 0);\n      const tgtArr = months.map(() => e.tgt);\n      const achArr = months.map((_, i) => e.tgt ? Math.round(e.gp[i] / e.tgt * 100) : 0);\n\n      const metric = (label, indent, type, color, vals, fy, opts) => ({\n        isSummary: false, isMetric: true, label, padLeft: (52 + indent * 18) + 'px',\n        labelColor: color, labelWeight: indent ? 500 : 600, labelStyle: indent ? 'italic' : 'normal',\n        caret: (opts && opts.caret) ? (teusOpen ? '\\u25BE' : '\\u25B8') : '',\n        labelCursor: (opts && opts.caret) ? 'pointer' : 'default',\n        onToggle: (opts && opts.caret) ? (() => setState(s => ({ teusOpen: { ...s.teusOpen, [e.name]: s.teusOpen[e.name] === false } }))) : undefined,\n        cells: buildCells(fy, vals, type, color, e.name, label),\n      });\n\n      rows.push(metric('Shipments', 0, 'int', '#15233B', e.ship, sum(e.ship)));\n      rows.push(metric('Total TEUs', 0, 'int', '#2F6FED', teus, sum(teus), { caret: true }));\n      if (teusOpen) {\n        rows.push(metric('FCL TEUs', 1, 'int', '#5B8DEF', fcl, sum(fcl)));\n        rows.push(metric('Tank TEUs', 1, 'int', '#9B59C6', e.tank, sum(e.tank)));\n        rows.push(metric('LCL (CBM)', 1, 'dash', '#9AA4B2', lcl, 0));\n        rows.push(metric('Tons (Air)', 1, 'dash', '#C2935A', tons, 0));\n      }\n      rows.push(metric('GP', 0, 'cur', '#15875A', e.gp, sum(e.gp)));\n      rows.push(metric('Target', 0, 'cur', '#2F6FED', tgtArr, e.tgt * 6));\n      rows.push(metric('Achievement %', 0, 'pct', '#15233B', achArr, achFy));\n    });\n\n    // ---------- at-a-glance insight ----------\n    const bestIdx = grand.gp.indexOf(Math.max(...grand.gp));\n    const downNames = this.repsRaw.filter(r => r.gp[5] < r.gp[4]).map(r => r.name);\n    let trendText;\n    if (downNames.length === 0) trendText = 'All reps are trending up month-over-month.';\n    else if (downNames.length === 1) trendText = downNames[0] + ' is the only rep trending down vs last month.';\n    else trendText = downNames.length + ' reps are trending down vs last month: ' + downNames.join(', ') + '.';\n    const insight = {\n      achFmt: achGrand + '%',\n      achColor: achGrand >= 100 ? '#15875A' : achGrand < 50 ? '#C26A12' : '#2F6FED',\n      targetFmt: this.fmtCur(tgtGrand),\n      bestMonth: months26[bestIdx],\n      bestMonthFmt: this.fmtCur(grand.gp[bestIdx]),\n      trendText,\n      trendColor: downNames.length ? '#C26A12' : '#15875A',\n    };\n\n    // ---------- GP vs Target trend chart ----------\n    const cW = 1000, cH = 280, padL = 24, padR = 18, padT = 30, padB = 34;\n    const plotW = cW - padL - padR, plotH = cH - padT - padB, baselineY = padT + plotH;\n    const tgtMonthly = tgtGrand / 6;\n    const maxV = Math.max(Math.max(...grand.gp), tgtMonthly) * 1.2;\n    const slot = plotW / 6;\n    const barW = Math.min(70, slot * 0.46);\n    const chartBars = grand.gp.map((v, i) => {\n      const cx = padL + slot * i + slot / 2;\n      const h = plotH * (v / maxV);\n      const ratio = v / tgtMonthly;\n      return {\n        x: (cx - barW / 2).toFixed(1), y: (baselineY - h).toFixed(1),\n        barW: barW.toFixed(1), h: h.toFixed(1),\n        color: ratio >= 1 ? '#15875A' : ratio >= 0.85 ? '#2F6FED' : '#E0973A',\n        valLabel: this.compact(v), valX: cx.toFixed(1), valY: (baselineY - h - 10).toFixed(1),\n        monthLabel: months26[i], monthX: cx.toFixed(1),\n        onClick: () => this.openDrill('Grand Total', 'Gross Profit', months26[i], this.fmtCur(v)),\n      };\n    });\n    const chart = {\n      W: cW, H: cH, padL, plotRight: cW - padR, baselineY,\n      monthY: (baselineY + 22).toFixed(1),\n      targetY: (baselineY - plotH * (tgtMonthly / maxV)).toFixed(1),\n      targetTextY: (baselineY - plotH * (tgtMonthly / maxV) - 8).toFixed(1),\n      targetLabel: 'Target ' + this.compact(tgtMonthly),\n      bars: chartBars,\n    };\n\n    const ov = this.seg(isOverview), tb = this.seg(isTable);\n    const usd = this.seg(this.state.currency === 'USD'), thb = this.seg(this.state.currency === 'THB');\n\n    return {\n      isOverview, isTable, ranked, kpis, insight, chart,\n      headerCols, tableRows: rows,\n      periodLabel: 'Jan – Jun 2026', currencyLabel: this.state.currency, rateLabel: '32.50',\n      drill: this.state.drill || {}, drillOpen: !!this.state.drill,\n      closeDrill: () => setState({ drill: null }),\n      drillStop: (ev) => ev.stopPropagation(),\n      viewOverview: () => setState({ view: 'overview' }),\n      viewTable: () => setState({ view: 'table' }),\n      setUSD: () => setState({ currency: 'USD' }),\n      setTHB: () => setState({ currency: 'THB' }),\n      ovBg: ov.bg, ovColor: ov.color, ovShadow: ov.shadow,\n      tblBg: tb.bg, tblColor: tb.color, tblShadow: tb.shadow,\n      usdBg: usd.bg, usdColor: usd.color, usdShadow: usd.shadow,\n      thbBg: thb.bg, thbColor: thb.color, thbShadow: thb.shadow,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
