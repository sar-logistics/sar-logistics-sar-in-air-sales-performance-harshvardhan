<style>
  /* Sidebar is always visible — fixed width, no collapse/toggle */
  #sidebar-el {
    width: 240px;
    flex-shrink: 0;
  }
  /* Prevent layout recalc on animating elements */
  .kpi-card { will-change: transform; contain: layout style; }
  /* Off-screen table rows don't need to paint — saves ~30% render time on large tables */
  #main-slot table tbody tr { content-visibility: auto; contain-intrinsic-size: 0 36px; }
  /* Smooth font swap — never shows invisible text */
  @font-face { font-display: swap; }
  /* GPU-accelerate sidebar (fixed layer) */
  #sidebar { will-change: transform; transform: translateZ(0); }
  /* ── Design tokens — derived from SAR's navy blue brand ── */
  :root {
    --navy:      #0D2B5E;   /* SAR primary navy — sidebar bg, key text */
    --navy-mid:  #1A3F7A;   /* sidebar hover / active bg */
    --navy-light:#224A8F;   /* sidebar active strong */
    --accent:    #1D5FCC;   /* call-to-action blue */
    --accent-dim:#2D6FDF;   /* lighter hover state */
    --surface:   #F4F7FB;   /* page background */
    --card:      #FFFFFF;
    --ink:       #0D2B5E;   /* primary text — SAR navy */
    --ink-mid:   #3C5275;
    --ink-soft:  #6B82A0;
    --border:    #D9E3EE;
    --border-light: #EAF0F8;
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:linear-gradient(160deg,#EAF2FC 0%,#F6F9FE 45%,#EEF4FC 100%);color:var(--ink);-webkit-font-smoothing:antialiased;}
  a{text-decoration:none;}
  button{font-family:inherit;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#C8D5E4;border-radius:8px;border:2px solid transparent;background-clip:content-box;}
  ::-webkit-scrollbar-thumb:hover{background:#AABCCE;background-clip:content-box;}

  @keyframes drwSlide{from{transform:translateX(36px);opacity:0;}to{transform:translateX(0);opacity:1;}}
  @keyframes ovFade{from{opacity:0;}to{opacity:1;}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @keyframes spin{to{transform:rotate(360deg);}}

  .navlink:hover{background:rgba(255,255,255,0.08) !important;}
  .btnq:hover{box-shadow:0 3px 8px rgba(13,43,94,0.14),0 1px 2px rgba(13,43,94,0.08) !important;transform:translateY(-1px);}
  .sumrow{cursor:pointer;}
  .sumrow:hover td{filter:brightness(0.985);}
  .dcell{cursor:pointer;}
  .dcell:hover{background:#E4EDFF !important;}
  .shipcard:hover{border-color:#C9D4E2 !important;background:#FCFDFF;}
  .kpi-card:hover{box-shadow:0 1px 2px rgba(13,43,94,0.05),0 12px 28px -6px rgba(13,43,94,0.14) !important;transform:translateY(-2px);border-color:#CDD6EA !important;}
  .kpi-card:hover .kpi-icon{transform:rotate(-6deg) scale(1.08);}

  /* ── Login screen ── */
  #login-screen{
    position:fixed;inset:0;
    background:linear-gradient(135deg, var(--navy) 0%, #163980 55%, #1D5FCC 100%);
    display:flex;align-items:center;justify-content:center;
    z-index:1000;animation:ovFade 0.3s ease;
  }
  .login-card{
    background:#FFFFFF;border:none;
    border-radius:18px;
    box-shadow:0 24px 64px rgba(10,22,50,0.36);
    width:400px;max-width:92vw;
    padding:40px 36px 32px;
    animation:fadeUp 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  .login-logo-wrap{display:flex;justify-content:center;margin-bottom:28px;}
  .login-logo-wrap img{height:52px;width:auto;}
  .login-divider-label{
    display:flex;align-items:center;gap:10px;
    font-size:10.5px;font-weight:600;color:#9AAFC8;
    letter-spacing:0.06em;text-transform:uppercase;
    margin:24px 0;
  }
  .login-divider-label::before,.login-divider-label::after{
    content:'';flex:1;height:1px;background:#E8EFF8;
  }
  .login-title{font-size:18px;font-weight:800;color:var(--navy);letter-spacing:-0.02em;margin-bottom:4px;text-align:center;}
  .login-subtitle{font-size:12px;color:#6B82A0;font-weight:500;margin-bottom:28px;line-height:1.6;text-align:center;}
  .google-btn{
    width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
    background:#FFFFFF;border:1.5px solid #D9E3EE;border-radius:10px;
    padding:12px 20px;font-size:13px;font-weight:600;color:var(--navy);
    cursor:pointer;font-family:inherit;transition:border-color 0.15s,box-shadow 0.15s,background 0.1s;
  }
  .google-btn:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,95,204,0.1);background:#FAFCFF;}
  .google-btn:active{background:#F3F7FF;}
  .google-btn:disabled{opacity:0.55;cursor:not-allowed;border-color:#E2E8F0;box-shadow:none;}
  .login-error{display:none;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:9px 12px;font-size:11.5px;color:#B91C1C;font-weight:500;margin-top:14px;line-height:1.5;}
  .login-error.show{display:block;}
  .login-footer{font-size:11px;color:#9AAFC8;font-weight:500;text-align:center;line-height:1.7;}
  .login-spinner{width:16px;height:16px;border:2px solid #D9E3EE;border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
  .login-badge{
    display:inline-flex;align-items:center;gap:5px;
    background:#EAF7EF;border:1px solid #C9EAD6;
    border-radius:20px;padding:3px 8px;
    font-size:10.5px;font-weight:700;color:#15875A;
    margin-bottom:14px;
  }
  .g-logo{flex-shrink:0;}
</style>
</head>
<body>

<!-- ── Login Screen ── -->
<div id="login-screen">
  <div class="login-card">
    <!-- SAR Logo -->
    <div class="login-logo-wrap">
      <img id="login-sar-logo" src="" alt="SAR — Connecting Continents" />
    </div>
    <!-- Live badge -->
    <div style="display:flex;justify-content:center;margin-bottom:14px;">
      <div class="login-badge">
        <span style="width:5px;height:5px;border-radius:50%;background:#1FAE6A;display:inline-block;"></span>
        FY 26 · FY 27 · Live Dashboard
      </div>
    </div>
    <div class="login-title">SAR Sales Performance</div>
    <div class="login-subtitle">Sign in with your SAR Google Workspace account to access the sales performance dashboard.</div>

    <!-- Google Sign-In button -->
    <button class="google-btn" id="google-signin-btn" onclick="startGoogleSignIn()">
      <svg class="g-logo" width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <!-- Error message -->
    <div class="login-error" id="login-error"></div>

    <div class="login-divider-label">Restricted Access</div>
    <div class="login-footer">
      Access is restricted to authorised SAR team members.<br>
      Contact <strong style="color:#3C5275;">Harshvardhan Rawat</strong> to request access.
    </div>
  </div>
</div>

<div id="app" style="display:none;height:100vh;width:100%;overflow:hidden;flex-direction:row;"></div>

/* ====================== AUTH ====================== */
// Bump this whenever aggregation/data logic changes — invalidates all
// existing browser caches instantly, even though MongoDB data itself
// hasn't changed (so the meta-timestamp check alone wouldn't catch it).
var CACHE_VERSION = 'v6'; // bumped: weekData now keyed by true ISO 8601 week (e.g. "2026-W14") instead of "MonthLabel:W1-4"
var GOOGLE_CLIENT_ID = '71401290862-it2v6ru4et49diahsv4j63h07pm68thr.apps.googleusercontent.com';
var currentUser = null;
var tokenClient = null;

// Initialise the token client once the GSI library is ready
// We use initTokenClient (implicit flow) — gives us an access_token we can
// exchange for an id_token via Google's userinfo endpoint, all client-side.
function initGoogleAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'openid email profile',
    callback: handleTokenResponse,
    error_callback: function(err) {
      console.error('OAuth error:', err);
      showLoginError('Sign-in failed. Please try again.');
      resetSignInButton();
    }
  });
}

function startGoogleSignIn() {
  hideLoginError();
  var btn = document.getElementById('google-signin-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="login-spinner"></div> Signing in…';

  if (!tokenClient) {
    showLoginError('Google Sign-In is still loading. Please wait a moment and try again.');
    resetSignInButton();
    return;
  }
  // This opens the real Google account picker popup on button click
  tokenClient.requestAccessToken({ prompt: 'select_account' });
}

function handleTokenResponse(tokenResponse) {
  if (tokenResponse.error) {
    resetSignInButton();
    return;
  }

  var btn = document.getElementById('google-signin-btn');
  btn.innerHTML = '<div class="login-spinner"></div> Verifying…';

  // Get userinfo from Google using the access token
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { Authorization: 'Bearer ' + tokenResponse.access_token }
  })
  .then(function(r) { return r.json(); })
  .then(function(userinfo) {
    if (!userinfo.email) {
      showLoginError('Could not retrieve your account info. Please try again.');
      resetSignInButton();
      return;
    }
    verifyWithBackend(userinfo);
  })
  .catch(function() {
    showLoginError('Could not reach Google. Please check your connection.');
    resetSignInButton();
  });
}

function verifyWithBackend(userinfo) {
  fetch('/api/mongo', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: userinfo.email, name: userinfo.name, picture: userinfo.picture })
  })
  .then(function(r) { return r.json().then(function(d){ return {ok: r.ok, data: d}; }); })
  .then(function(res) {
    if (!res.ok || !res.data.success) {
      var msg = res.data.message || res.data.error || 'Access denied.';
      showLoginError(msg);
      resetSignInButton();
      return;
    }
    currentUser = res.data.user;
    showDashboard();
  })
  .catch(function(err) {
    console.error('Backend error:', err);
    showLoginError('Could not reach the server. Please check your connection and try again.');
    resetSignInButton();
  });
}

function showDashboard() {
  var loginScreen = document.getElementById('login-screen');
  var appEl = document.getElementById('app');

  loginScreen.style.opacity = '0';
  loginScreen.style.transition = 'opacity 0.25s ease';
  setTimeout(function() {
    loginScreen.style.display = 'none';
    appEl.style.display = 'flex';

    // Render instantly from localStorage cache if we have one — no TTL,
    // it lives until MongoDB actually has newer data
    var cached = getCachedSalesData();
    if (cached) {
      repsRawOriginal = cached.repsRaw;
      zonesRaw  = cached.zones || [];
      months26  = cached.months || months26;
      syncDateRangeToData();
      dataReady = true;
      render();
    } else {
      appEl.innerHTML = loadingScreen();
    }

    if (currentUser) {
      var ini = currentUser.name.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
      var roleLabel = currentUser.role.charAt(0).toUpperCase() + currentUser.role.slice(1);
      window._pendingUserPatch = { ini: ini, name: currentUser.name, role: roleLabel, photoUrl: currentUser.photoUrl };
      if (cached) patchSidebarUser(ini, currentUser.name, roleLabel, currentUser.photoUrl);
    }

    // Cheap check: has MongoDB data changed since our cache was built?
    checkForFreshData(cached, function(needsRefresh) {
      if (!needsRefresh) return; // cache is still current — skip the heavy fetch entirely

      fetchLiveData(function() {
        render();
        if (window._pendingUserPatch) {
          var p = window._pendingUserPatch;
          patchSidebarUser(p.ini, p.name, p.role, p.photoUrl);
        }
      });
    });
  }, 260);
}

// Lightweight check — just reads a timestamp, no aggregation cost
function checkForFreshData(cached, callback) {
  fetch('/api/mongo-batch?action=meta')
    .then(function(r){ return r.json(); })
    .then(function(meta){
      if (!cached) return callback(true); // no cache at all — must fetch
      if (!meta.lastUpdated) return callback(false); // no push recorded — trust cache
      var dbUpdatedAt = new Date(meta.lastUpdated).getTime();
      var cacheBuiltAt = cached._cachedAt || 0;
      callback(dbUpdatedAt > cacheBuiltAt); // refresh only if DB is newer than our cache
    })
    .catch(function(){
      // Meta check failed — fall back to using cache if we have one, else fetch
      callback(!cached);
    });
}

function getCachedSalesData() {
  try {
    var raw = localStorage.getItem('sar_sales_cache_' + CACHE_VERSION);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}

function setCachedSalesData(data) {
  try {
    data._cachedAt = Date.now();
    localStorage.setItem('sar_sales_cache_' + CACHE_VERSION, JSON.stringify(data));
  } catch (e) { /* storage full or unavailable — ignore */ }
}

function loadingScreen() {
  return '<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:#F4F7FB;">'
    +'<div style="display:flex;flex-direction:column;align-items:center;gap:14px;">'
      +'<div class="login-spinner" style="width:28px;height:28px;border-width:3px;"></div>'
      +'<div style="font-size:12.5px;color:#64748B;font-weight:600;">Loading sales performance data…</div>'
    +'</div>'
  +'</div>';
}

function showRefreshOverlay() {
  if (document.getElementById('refresh-overlay')) return; // already showing
  var ov = document.createElement('div');
  ov.id = 'refresh-overlay';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(244,247,251,0.75);z-index:400;display:flex;align-items:center;justify-content:center;animation:ovFade 0.15s ease;';
  ov.innerHTML = '<div style="background:#FFFFFF;border:1px solid #E7ECF3;border-radius:12px;box-shadow:0 12px 40px rgba(15,23,40,0.14);padding:28px 36px;display:flex;flex-direction:column;align-items:center;gap:14px;">'
    +'<div class="login-spinner" style="width:26px;height:26px;border-width:3px;"></div>'
    +'<div style="font-size:12.5px;color:#374151;font-weight:600;">Refreshing data from MongoDB…</div>'
  +'</div>';
  document.body.appendChild(ov);
}

function hideRefreshOverlay() {
  var ov = document.getElementById('refresh-overlay');
  if (ov) ov.remove();
}

function patchSidebarUser(initials, name, role, photoUrl) {
  // Called after render() builds the sidebar — uses stable IDs now
  setTimeout(function() {
    var avatarEl = document.getElementById('sidebar-avatar');
    if (avatarEl) {
      if (photoUrl) {
        avatarEl.innerHTML = '<img src="'+photoUrl+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />';
        avatarEl.style.padding = '0';
        avatarEl.style.overflow = 'hidden';
      } else {
        avatarEl.textContent = initials;
      }
    }
    var nameEl = document.getElementById('sidebar-name');
    if (nameEl) nameEl.textContent = name || 'SAR_IN – Air';
    var roleEl = document.getElementById('sidebar-subrole');
    if (roleEl) roleEl.textContent = name + ' · ' + role;
  }, 50);
}

function showLoginError(msg) {
  var el = document.getElementById('login-error');
  if (el) { el.textContent = msg; el.classList.add('show'); }
}
function hideLoginError() {
  var el = document.getElementById('login-error');
  if (el) el.classList.remove('show');
}
function resetSignInButton() {
  var btn = document.getElementById('google-signin-btn');

// Recompute the working `repsRaw` from `repsRawOriginal` based on active
// Rep and LOB filters. Called at the top of every render() so all downstream
// code (grandEntity, zoneEntity, repEntity, kpiRow, model, etc.) automatically
// sees filtered data without needing any changes themselves.
function computeFilteredRepsRaw(){
  var filterReps = state.filterReps || [];
  var filterLobs = state.filterLobs || [];

  var base = repsRawOriginal;
  // 1. Filter by rep/branch name — strict selection. When a Rep filter is
  //    active, ONLY the selected names are shown (branches included only if
  //    explicitly checked, same as any individual rep). This is what makes
  //    checking/unchecking a rep actually move the Grand Total — nothing is
  //    exempted from the filter.
  if (filterReps.length > 0) {
    base = base.filter(function(r){ return filterReps.indexOf(r.name) > -1; });
  }

  // 2. Filter by LOB — rebuild gp/gpProv/gpActual/ship/tons/teu/lcl arrays from lobData
  if (filterLobs.length === 0) {
    repsRaw = base;
    return;
  }

  repsRaw = base.map(function(r){
    var n = r.gp.length;
    var lobData = r.lobData || {};
    var gp = [], gpProv = [], gpActual = [], ship = [], tons = [], teu = [], lcl = [];
    for (var i = 0; i < n; i++) {
      var m = months26[i];
      var g=0, gpv=0, gac=0, sh=0, tn=0, tu=0, lc=0;
      filterLobs.forEach(function(lobKey){
        var bucket = lobData[lobKey] && lobData[lobKey][m];
        if (bucket) {
          g += bucket.gp || 0; gpv += bucket.gpProv || 0; gac += bucket.gpActual || 0;
          sh += bucket.ship || 0; tn += bucket.tons || 0; tu += bucket.teu || 0; lc += bucket.lcl || 0;
        }
      });
      gp.push(g); gpProv.push(gpv); gpActual.push(gac);
      ship.push(sh); tons.push(tn); teu.push(tu); lcl.push(lc);
    }
    // Weekly data isn't tracked per-LOB — when a LOB filter is active, Weekly view
    // will show zero for filtered reps (acceptable trade-off; documented behaviour)
    return Object.assign({}, r, { gp:gp, gpProv:gpProv, gpActual:gpActual, ship:ship, tons:tons, teu:teu, lcl:lcl, weekData: {} });
  });
}

function fmtCur(v){
  // Raw GP values from the JPA sheet (Actual Profit J=C-G) are already in INR.
  // INR display: show as-is (no conversion needed)
  // USD display: divide by exchange rate to convert INR → USD
  var val = state.currency === 'USD' ? v / state.rate : v;
  var sym = state.currency === 'INR' ? '\u20B9' : '$';
  var neg = val < 0;
  var abs = Math.abs(val);
  var out;

  if (state.currency === 'INR') {
    // Indian numbering: Crore (1,00,00,000) → Lakh (1,00,000) → Thousand
    if (abs >= 1e7)      out = (abs/1e7).toFixed(2)  + ' Cr.';
    else if (abs >= 1e5) out = (abs/1e5).toFixed(2)  + ' L';
    else if (abs >= 1e3) out = (abs/1e3).toFixed(2)  + 'k';
    else                 out = abs.toFixed(2);
  } else {
    // International: Million → Thousand
    if (abs >= 1e6)      out = (abs/1e6).toFixed(2) + ' Mn';
    else if (abs >= 1e3) out = (abs/1e3).toFixed(2) + 'k';
    else                 out = abs.toFixed(2);
  }

  return (neg ? '-' : '') + sym + out;
}

function sparkOf(arr){
  var max=Math.max.apply(null,arr), min=Math.min.apply(null,arr);
  var W=104,H=30,pad=4;
  return arr.map(function(v,i){
    var x=pad+i*((W-2*pad)/(arr.length-1));
    var y=(H-pad)-((v-min)/((max-min)||1))*(H-2*pad);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
}

// Single source of truth for which month indices are currently visible.
// Every function that renders data calls this — nothing else should compute
// a month range independently.
function filteredMonthIndices(){
  if (!months26 || months26.length === 0) return [];
  var v = state.reportView;

  // Helper: get month abbreviation from label e.g. "Apr-25" → "Apr"
  function mo(label){ return label.split('-')[0]; }
  // Helper: get 2-digit year suffix e.g. "Apr-25" → "25"
  function yr(label){ return label.split('-')[1]; }

  // Weekly: show only the single selected month
  if (v === 'Weekly') {
    var wi = months26.indexOf(state.weeklyMonth || months26[months26.length-1]);
    return wi >= 0 ? [wi] : [months26.length - 1];
  }

  // Quarterly: Q1=Apr-Jun, Q2=Jul-Sep, Q3=Oct-Dec, Q4=Jan-Mar (Indian FY)
  if (v === 'Quarterly') {
    var qMap = {
      'Q1': ['Apr','May','Jun'],
      'Q2': ['Jul','Aug','Sep'],
      'Q3': ['Oct','Nov','Dec'],
      'Q4': ['Jan','Feb','Mar']
    };
    var qMos = qMap[state.selectedQuarter] || [];
    // FY26 = Apr-25→Mar-26, FY27 = Apr-26→Mar-27
    // For Q4 (Jan-Mar), the year suffix shifts by 1 (Jan-26 belongs to FY26)
    var fyYrMap = { 'FY26': { normal:'25', q4:'26' }, 'FY27': { normal:'26', q4:'27' } };
    var fyYr = fyYrMap[state.quarterYear] || fyYrMap['FY26'];
    return months26.reduce(function(acc, m, i){
      var mMonth = mo(m), mYear = yr(m);
      if (qMos.indexOf(mMonth) < 0) return acc;
      // Q4 months (Jan/Feb/Mar) have a different year suffix in the FY
      var expectedYr = (state.selectedQuarter === 'Q4') ? fyYr.q4 : fyYr.normal;
      if (mYear === expectedYr) acc.push(i);
      return acc;
    }, []);
  }

  // Yearly: Financial (Apr-Mar) = all months, Calendar (Jan-Dec) = filter by Jan-Dec months
  if (v === 'Yearly') {
    if (state.yearType === 'Calendar') {
      // Calendar year = exclude Apr-Dec of the first FY year (Apr-25 to Dec-25 excluded,
      // only keep Jan-Mar of each year grouping i.e. Jan-26, Feb-26, Mar-26 etc.)
      // More accurately: keep months whose prefix is Jan-Dec (all months) but
      // grouped into Jan-Dec calendar year. Since data spans Apr-25→Dec-26,
      // Calendar Year = Jan-26 onwards (Jan-26 to Dec-26).
      return months26.reduce(function(acc, m, i){
        // Calendar year: include only months from Jan-XX onwards (skip Apr-Dec of first year)
        var m3 = mo(m);
        var y2 = yr(m);
        // Keep if it belongs to a full calendar year range present in data
        // Simple rule: include Jan-26 through Dec-26 (year "26")
        var calYears = {};
        months26.forEach(function(ml){
          var y = yr(ml); var month = mo(ml);
          if (month === 'Jan') calYears[y] = true;
        });
        if (calYears[y2]) acc.push(i);
        return acc;
      }, []);
    } else {
      // Financial Year (Apr-Mar) — all available months
      return months26.map(function(_,i){ return i; });
    }
  }

  // Monthly / Custom: dateFrom → dateTo range
  var fi = months26.indexOf(state.dateFrom);
  var ti = months26.indexOf(state.dateTo);
  if (fi < 0 && ti < 0) return months26.map(function(_,i){ return i; });
  if (fi < 0) fi = 0;
  if (ti < 0) ti = months26.length - 1;
  if (fi > ti) { var tmp = fi; fi = ti; ti = tmp; }
  var idx = [];
  for (var i = fi; i <= ti; i++) idx.push(i);
  return idx;
}

function hasDataForIndices(idxs){
  if (state.reportView === 'Weekly') {
    var wkeys = filteredWeekKeys();
    // Check weekData first; fall back to monthly check if weekData not loaded yet
    var hasWeekData = repsRaw.some(function(r){ return r.weekData && Object.keys(r.weekData).length > 0; });
    if (!hasWeekData) {
      // weekData not in cache yet — fall back to monthly index check
      var mi = months26.indexOf(state.weeklyMonth || months26[months26.length-1]);
      if (mi < 0) return false;
      return repsRaw.some(function(r){ return (r.ship[mi]||0) > 0 || (r.gp[mi]||0) !== 0; });
    }
    return repsRaw.some(function(r){
      return wkeys.some(function(k){
        return r.weekData && r.weekData[k] && ((r.weekData[k].ship||0) > 0 || (r.weekData[k].gp||0) !== 0);
      });
    });
  }
  if (!idxs || idxs.length === 0) return false;
  return repsRaw.some(function(r){
    return idxs.some(function(i){
      return (r.ship[i]||0) > 0 || (r.gp[i]||0) !== 0;
    });
  });
}

var MONTH_NAME_TO_IDX = { Jan:0, Feb:1, Mar:2, Apr:3, May:4, Jun:5, Jul:6, Aug:7, Sep:8, Oct:9, Nov:10, Dec:11 };
var MONTH_IDX_TO_NAME = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// True ISO 8601 week number (Mon-Sun) — mirrors the backend's isoWeekInfo()
// exactly, so frontend-computed week keys always match backend-computed ones.
function getISOWeek(date){
  var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  var dayNum = (d.getUTCDay() + 6) % 7; // Mon=0 .. Sun=6
  var thursday = new Date(d);
  thursday.setUTCDate(d.getUTCDate() - dayNum + 3);
  var isoYear = thursday.getUTCFullYear();
  var firstThursday = new Date(Date.UTC(isoYear, 0, 4));
  var fThDayNum = (firstThursday.getUTCDay() + 6) % 7;
  firstThursday.setUTCDate(firstThursday.getUTCDate() - fThDayNum + 3);
  var weekNum = 1 + Math.round((thursday - firstThursday) / (7 * 86400000));
  var monday = new Date(d);
  monday.setUTCDate(d.getUTCDate() - dayNum);
  var sunday = new Date(monday);
  sunday.setUTCDate(monday.getUTCDate() + 6);
  var key = isoYear + '-W' + String(weekNum).padStart(2, '0');
  return { key: key, weekNum: weekNum, isoYear: isoYear, monday: monday, sunday: sunday };
}

// Rebuild a week's Monday/Sunday dates purely from its ISO key (e.g. "2026-W14")
// — used when we only have the key string (from weekData), not an original date.
function isoWeekFromKey(isoKey){
  var parts = isoKey.split('-W');
  var isoYear = parseInt(parts[0], 10);
  var weekNum = parseInt(parts[1], 10);
  var jan4 = new Date(Date.UTC(isoYear, 0, 4));
  var jan4DayNum = (jan4.getUTCDay() + 6) % 7;
  var week1Monday = new Date(jan4);
  week1Monday.setUTCDate(jan4.getUTCDate() - jan4DayNum);
  var monday = new Date(week1Monday);
  monday.setUTCDate(week1Monday.getUTCDate() + (weekNum - 1) * 7);
  var sunday = new Date(monday);
  sunday.setUTCDate(monday.getUTCDate() + 6);
  return { key: isoKey, weekNum: weekNum, isoYear: isoYear, monday: monday, sunday: sunday };
}

function fmtWeekDate(d){
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getUTCMonth()] + ' ' + d.getUTCDate() + ', ' + d.getUTCFullYear();
}

// Returns the ISO week keys whose Monday falls within the selected calendar
// month (state.weeklyMonth, e.g. "Apr-26") — a week can extend into the next
// or previous month, but it's grouped under whichever month its Monday is in.
function filteredWeekKeys(){
  var m = state.weeklyMonth || months26[months26.length-1];
  var bits = m.split('-');
  var monthIdx = MONTH_NAME_TO_IDX[bits[0]];
  var year = 2000 + parseInt(bits[1], 10);
  var daysInMonth = new Date(Date.UTC(year, monthIdx + 1, 0)).getUTCDate();
  var keysSeen = {};
  var keys = [];
  // Include a week if ANY of its days (Mon-Sun) fall within the selected
  // calendar month — so a week straddling a month boundary (e.g. Week 14:
  // Mar 30 - Apr 5, 2026) appears under BOTH March and April.
  for (var day = 1; day <= daysInMonth; day++) {
    var d = new Date(Date.UTC(year, monthIdx, day));
    var iso = getISOWeek(d);
    if (!keysSeen[iso.key]) { keysSeen[iso.key] = true; keys.push(iso.key); }
  }
  return keys;
}

// Helper: the actual column labels for the current view
// Monthly/Quarterly/Yearly/Custom → month labels; Weekly → ISO week keys
function filteredMonths(){
  if (state.reportView === 'Weekly') {
    return filteredWeekKeys();
  }
  return filteredMonthIndices().map(function(i){ return months26[i]; });
}

// For Yearly view: group months by calendar year (e.g. "25", "26")
// Returns [{year:"25", label:"2025", range:"Jan 2025 – Dec 2025", idxs:[0,1,2,...]}, ...]
function yearGroups(){
  var idxs = filteredMonthIndices();
  var groups = {};
  var order = [];
  idxs.forEach(function(i){
    var m = months26[i];
    var y2 = m.split('-')[1]; // "25" or "26"
    var fullYear = '20'+y2;
    if (!groups[y2]) {
      groups[y2] = { year: y2, label: fullYear, idxs: [] };
      order.push(y2);
    }
    groups[y2].idxs.push(i);
  });
  // Add range label e.g. "Jan 2025 – Dec 2025"
  order.forEach(function(y2){
    var g = groups[y2];
    var ms = g.idxs.map(function(i){ return months26[i]; });
    var first = ms[0], last = ms[ms.length-1];
    var MNAMES = {Jan:'Jan',Feb:'Feb',Mar:'Mar',Apr:'Apr',May:'May',Jun:'Jun',Jul:'Jul',Aug:'Aug',Sep:'Sep',Oct:'Oct',Nov:'Nov',Dec:'Dec'};
    var fy = first.split('-'); var ly = last.split('-');
    g.range = fy[0]+' 20'+fy[1]+' – '+ly[0]+' 20'+ly[1];
  });
  return order.map(function(y2){ return groups[y2]; });
}

// Display label for a column: ISO week keys show as "Week N" + date range
// below it (e.g. "Apr 1, 2026 - Apr 7, 2026"); months show as-is
function colDisplayLabel(key){
  if (key && /^\d{4}-W\d{2}$/.test(key)) {
    var iso = isoWeekFromKey(key);
    return 'Week ' + iso.weekNum + '||' + fmtWeekDate(iso.monday) + ' - ' + fmtWeekDate(iso.sunday);
  }
  return key;
}

function entityWeekArrays(r, metric){
  var keys = filteredWeekKeys();
  var wd = (r.weekData) || {};
  return keys.map(function(k){ return (wd[k] && wd[k][metric]) || 0; });
}

// Sync state.dateFrom / state.dateTo to the actual available months.
// Call this whenever months26 changes (API load, cache load).
function syncDateRangeToData(){
  if (!months26 || months26.length === 0) return;
  var fiOk = months26.indexOf(state.dateFrom) >= 0;
  var tiOk = months26.indexOf(state.dateTo)   >= 0;
  if (!fiOk) state.dateFrom = months26[0];
  if (!tiOk) state.dateTo   = months26[months26.length - 1];
  var fi = months26.indexOf(state.dateFrom);
  var ti = months26.indexOf(state.dateTo);
  if (fi > ti) { state.dateTo = months26[months26.length - 1]; }
  if (!state.weeklyMonth || months26.indexOf(state.weeklyMonth) < 0) {
    state.weeklyMonth = months26[months26.length - 1];
  }
}

function model(){
  var isWeekly = state.reportView === 'Weekly' && weekDataLoaded();
  if (isWeekly) {
    var wkeys = filteredWeekKeys();
    var gpGrand   = sum(repsRaw.map(function(r){return sum(wkeys.map(function(k){return (r.weekData&&r.weekData[k]&&r.weekData[k].gp)||0;}));}));
    var shipGrand = sum(repsRaw.map(function(r){return sum(wkeys.map(function(k){return (r.weekData&&r.weekData[k]&&r.weekData[k].ship)||0;}));}));
    var tonsGrand = sum(repsRaw.map(function(r){return sum(wkeys.map(function(k){return (r.weekData&&r.weekData[k]&&r.weekData[k].tons)||0;}));}));
    var teusGrand = sum(repsRaw.map(function(r){return sum(wkeys.map(function(k){return (r.weekData&&r.weekData[k]&&r.weekData[k].teu)||0;}));}));
    var tgtGrand  = sum(zonesRaw.map(function(z){return (z.monthlyTarget||0);})); // 1 month target
    var achGrand  = tgtGrand > 0 ? Math.round(gpGrand / tgtGrand * 100) : 0;
    return {gpGrand:gpGrand, shipGrand:shipGrand, tonsGrand:tonsGrand, tgtGrand:tgtGrand, achGrand:achGrand, teusGrand:teusGrand};
  }
  var idxs = filteredMonthIndices();
  var gpGrand   = sum(repsRaw.map(function(r){return sum(idxs.map(function(i){return r.gp[i]||0;}));}));
  var shipGrand = sum(repsRaw.map(function(r){return sum(idxs.map(function(i){return r.ship[i]||0;}));}));
  var tonsGrand = sum(repsRaw.map(function(r){return sum(idxs.map(function(i){return (r.tons&&r.tons[i])||0;}));}));
  var tgtGrand  = sum(zonesRaw.map(function(z){return (z.monthlyTarget||0) * idxs.length;}));
  var achGrand  = tgtGrand > 0 ? Math.round(gpGrand / tgtGrand * 100) : 0;
  var teusGrand = sum(repsRaw.map(function(r){return sum(idxs.map(function(i){return (r.teu&&r.teu[i])||0;}));}));
  return {gpGrand:gpGrand, shipGrand:shipGrand, tonsGrand:tonsGrand, tgtGrand:tgtGrand, achGrand:achGrand, teusGrand:teusGrand};
}

// True if the current repsRaw has weekData populated (post-Refresh)
function weekDataLoaded(){
  return repsRaw.some(function(r){ return r.weekData && Object.keys(r.weekData).length > 0; });
}

// Returns unique zones in order
function getZones(){
  var seen = {}, zones = [];
  repsRaw.forEach(function(r){
    if (!seen[r.zone]) { seen[r.zone] = true; zones.push(r.zone); }
  });
  return zones;
}

// Zone-level aggregate entity
function zoneEntity(zoneName){
  var isWeekly = state.reportView === 'Weekly' && weekDataLoaded();
  var idxs = filteredMonthIndices();

  return {

    isZone: true, zone: zoneName,
    ship: isWeekly ? wkeys.map(function(k){return zReps.reduce(function(s,r){return s+((r.weekData&&r.weekData[k]&&r.weekData[k].ship)||0);},0);})
                   : idxs.map(function(i){return sum(zReps.map(function(r){return r.ship[i]||0;}));}),

                   : idxs.map(function(i){return sum(zReps.map(function(r){return r.gp[i]||0;}));}),
    tons: isWeekly ? wkeys.map(function(k){return zReps.reduce(function(s,r){return s+((r.weekData&&r.weekData[k]&&r.weekData[k].tons)||0);},0);})
                   : idxs.map(function(i){return sum(zReps.map(function(r){return (r.tons&&r.tons[i])||0;}));}),
    teu:  isWeekly ? wkeys.map(function(k){return zReps.reduce(function(s,r){return s+((r.weekData&&r.weekData[k]&&r.weekData[k].teu)||0);},0);})
                   : idxs.map(function(i){return sum(zReps.map(function(r){return (r.teu&&r.teu[i])||0;}));}),
    lcl:  isWeekly ? wkeys.map(function(k){return zReps.reduce(function(s,r){return s+((r.weekData&&r.weekData[k]&&r.weekData[k].lcl)||0);},0);})
                   : idxs.map(function(i){return sum(zReps.map(function(r){return (r.lcl&&r.lcl[i])||0;}));}),
    gpProv:   idxs.map(function(i){ return sum(zReps.map(function(r){ return (r.gpProv&&r.gpProv[i])||0; })); }),
    gpActual: idxs.map(function(i){ return sum(zReps.map(function(r){ return (r.gpActual&&r.gpActual[i])||0; })); }),
    tank: (isWeekly ? wkeys : idxs).map(function(){ return 0; }),
    tgt:  zData.monthlyTarget || sum(zReps.map(function(r){ return r.tgt; }))
  };
}

function zoneHue(zone){
  var h = 0;
  for (var i = 0; i < zone.length; i++) h = (h * 31 + zone.charCodeAt(i)) & 0xffff;
  return h % 360;
}

function repEntity(r){
  var isWeekly = state.reportView === 'Weekly' && weekDataLoaded();
  var idxs = filteredMonthIndices();
  var wkeys = isWeekly ? filteredWeekKeys() : null;
  var ini = r.isBranch ? r.name.slice(0,2).toUpperCase() : initials(r.name);
  var wd = r.weekData || {};
  return {
    name: r.name, initials: ini,
    avatarBg: 'oklch(0.6 0.12 ' + r.hue + ')',
    isRep: true, isBranch: !!r.isBranch, zone: r.zone,
    ship: isWeekly ? wkeys.map(function(k){return (wd[k]&&wd[k].ship)||0;}) : idxs.map(function(i){return r.ship[i]||0;}),
    gp:   isWeekly ? wkeys.map(function(k){return (wd[k]&&wd[k].gp)  ||0;}) : idxs.map(function(i){return r.gp[i]  ||0;}),
    tons: isWeekly ? wkeys.map(function(k){return (wd[k]&&wd[k].tons)||0;}) : idxs.map(function(i){return (r.tons&&r.tons[i])||0;}),
    teu:  isWeekly ? wkeys.map(function(k){return (wd[k]&&wd[k].teu) ||0;}) : idxs.map(function(i){return (r.teu&&r.teu[i])||0;}),
    lcl:  isWeekly ? wkeys.map(function(k){return (wd[k]&&wd[k].lcl) ||0;}) : idxs.map(function(i){return (r.lcl&&r.lcl[i])||0;}),
    gpProv:   idxs.map(function(i){ return (r.gpProv  &&r.gpProv[i]  )||0; }),
    gpActual: idxs.map(function(i){ return (r.gpActual&&r.gpActual[i])||0; }),
    tank: (isWeekly ? wkeys : idxs).map(function(){ return 0; }),
    tgt:  r.tgt
  };
}

function entities(){
  // Grand Total + Zone groups + Reps within each zone
  // Weekly view omits the Grand Total row per request — only zones/reps shown
  var list = state.reportView === 'Weekly' ? [] : [grandEntity()];
  getZones().forEach(function(z){
    list.push(zoneEntity(z));
    var isCollapsed = state.zoneOpen[z] === false; // default open unless explicitly collapsed
    if (!isCollapsed) {
      repsRaw.filter(function(r){ return r.zone === z; }).forEach(function(r){
        list.push(repEntity(r));
      });
    }
  });
  return list;
}

                + '</div>'

          var panelHtml = '<div id="filters-drop" data-stop="1" style="position:fixed;background:#FFFFFF;border-radius:14px;box-shadow:0 12px 36px rgba(13,43,94,0.2),0 0 0 1px rgba(13,43,94,0.07);z-index:9999;width:280px;padding:16px;pointer-events:auto;">'

/* ====================== KPI CARDS ====================== */
function kpiRow(M){
  var idxs = filteredMonthIndices();
  var n = idxs.length || 1;
  var noData = !hasDataForIndices(idxs);

  // MoM delta — compare last month vs month before, only if meaningful
  function momDelta(data){
    if (!data || data.length < 2) return null;
    var last = data[data.length-1], prev = data[data.length-2];
    if (!prev || prev === 0) return null;
    var pct = Math.round((last - prev) / Math.abs(prev) * 100);
    if (Math.abs(pct) < 1) return null; // suppress noise
    return pct;
  }

  function deltaEl(pct, label){
    if (pct === null) return '<div style="height:16px;"></div>';
    var up = pct > 0;
    var c  = up ? '#0A7E53' : pct < 0 ? '#C0392B' : '#6B82A0';
    return '<div style="display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:'+c+';">'
      +'<span>'+(up?'+':'')+pct+'%</span>'
      +'<span style="color:#6B82A0;font-weight:600;">'+label+'</span>'
    +'</div>';
  }

  // Trend colour: green if last value > first, red if down, neutral blue if flat
  function trendColor(data){
    if (!data || data.length < 2) return BRAND_A1;
    var last = data[data.length-1], prev = data[data.length-2];
    if (last > prev) return '#1D9E6F';
    if (last < prev) return '#D94F4F';
    return BRAND_A1;
  }

  var achColor = M.achGrand >= 100 ? '#0A7E53' : M.achGrand < 0 ? '#C0392B' : '#0D2B5E';

  var isWeeklyView = state.reportView === 'Weekly' && weekDataLoaded();
  var wkeys = isWeeklyView ? filteredWeekKeys() : null;

  var shipData  = isWeeklyView
    ? wkeys.map(function(k){ return repsRaw.reduce(function(s,r){ return s+((r.weekData&&r.weekData[k]&&r.weekData[k].ship)||0); },0); })
    : idxs.map(function(i){ return repsRaw.reduce(function(s,r){return s+(r.ship[i]||0);},0); });
  var teuData   = isWeeklyView
    ? wkeys.map(function(k){ return repsRaw.reduce(function(s,r){ return s+((r.weekData&&r.weekData[k]&&r.weekData[k].teu)||0); },0); })
    : idxs.map(function(i){ return repsRaw.reduce(function(s,r){return s+((r.teu&&r.teu[i])||0);},0); });
  var tonsData  = isWeeklyView
    ? wkeys.map(function(k){ return repsRaw.reduce(function(s,r){ return s+((r.weekData&&r.weekData[k]&&r.weekData[k].tons)||0); },0); })
    : idxs.map(function(i){ return repsRaw.reduce(function(s,r){return s+((r.tons&&r.tons[i])||0);},0); });
  var gpData    = isWeeklyView
    ? wkeys.map(function(k){ return repsRaw.reduce(function(s,r){ return s+((r.weekData&&r.weekData[k]&&r.weekData[k].gp)||0); },0); })
    : idxs.map(function(i){ return repsRaw.reduce(function(s,r){return s+(r.gp[i]||0);},0); });
  var tgtData   = isWeeklyView
    ? wkeys.map(function(){ return M.tgtGrand / (wkeys.length||1); })
    : idxs.map(function(){ return M.tgtGrand / n; });
  var achData   = isWeeklyView
    ? wkeys.map(function(k){
        var gp  = repsRaw.reduce(function(s,r){ return s+((r.weekData&&r.weekData[k]&&r.weekData[k].gp)||0); },0);
        var tgt = repsRaw.reduce(function(s,r){ return s+r.tgt; },0);
        return tgt > 0 ? Math.round(gp/tgt*100) : 0;
      })
    : idxs.map(function(idx_inner){
    var gp  = repsRaw.reduce(function(s,r){return s+(r.gp[idx_inner]||0);},0);
    var tgt = repsRaw.reduce(function(s,r){return s+r.tgt;},0);
    return tgt > 0 ? Math.round(gp/tgt*100) : 0;
  });

  // Label adapts to the active view mode
  var periodLabel = state.reportView === 'Monthly'  ? 'vs prev month'
                  : state.reportView === 'Weekly'   ? 'vs prev week'
                  : state.reportView === 'Quarterly'? 'vs prev quarter'
                  : state.reportView === 'Yearly'   ? 'vs prev year'
                  : 'vs prev period'; // Custom

  var fmtInt  = function(v){ return Math.round(v).toLocaleString('en-IN'); };
  var fmtTon  = function(v){ return v ? v.toFixed(1)+'t' : '—'; };
  var fmtTeu  = function(v){ return v ? v.toFixed(2) : '—'; };
  var fmtPct  = function(v){ return Math.round(v)+'%'; };

  var kpis = [
    { label:'TOTAL SHIPMENTS', value: noData ? '—' : String(M.shipGrand),                              delta: noData ? null : momDelta(shipData), deltaLabel:periodLabel, vcolor:'#0D2B5E', tint:'#5678C2' },
    { label:'TOTAL TEUS',      value: noData ? '—' : M.teusGrand.toFixed(2),                           delta: noData ? null : momDelta(teuData),  deltaLabel:periodLabel, vcolor:'#0D2B5E', tint:'#1D9E6F' },
    { label:'TONS (AIR)',      value: noData ? '—' : (M.tonsGrand ? M.tonsGrand.toFixed(2) : '\u2014'),delta: noData ? null : momDelta(tonsData), deltaLabel:periodLabel, vcolor:'#0D2B5E', tint:'#7C6FE0' },
    { label:'GROSS PROFIT',    value: noData ? '—' : fmtCur(M.gpGrand),                                delta: noData ? null : momDelta(gpData),   deltaLabel:periodLabel, vcolor:'#0D2B5E', tint:'#D4941E' },
    { label:'GP TARGET',       value: noData ? '—' : fmtCur(M.tgtGrand),                               delta:null, deltaLabel: noData ? 'No data' : 'Monthly avg '+fmtCur(Math.round(M.tgtGrand/n)), vcolor:'#0D2B5E', tint:'#D4574A' },
    { label:'ACHIEVEMENT',     value: noData ? '—' : M.achGrand+'%',                                   delta:null, deltaLabel: noData ? 'No data' : 'vs target', vcolor: noData ? '#9AAFC8' : achColor, tint: achColor },
  ];

  return '<div style="display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px;margin-bottom:14px;">'
    + kpis.map(function(k){
      return '<div class="kpi-card" style="position:relative;background:rgba(255,255,255,0.66);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.8);border-radius:16px;padding:16px 14px 14px;box-shadow:0 1px 2px rgba(13,43,94,0.04),0 8px 24px -6px rgba(93,138,206,0.18);transition:box-shadow 0.2s ease,transform 0.2s ease;min-width:0;overflow:hidden;">'
        // Slim colour accent bar at the top — clean, intentional, matches each metric's identity
        +'<div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,'+k.tint+',' +k.tint+'88);"></div>'
        // Label
        +'<div style="font-size:8px;font-weight:800;letter-spacing:0.1em;color:#5B7298;text-transform:uppercase;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+k.label+'</div>'
        // Big value
        +'<div style="font-family:\'DM Mono\',monospace;font-size:18px;font-weight:700;color:'+k.vcolor+';line-height:1.1;margin-bottom:5px;letter-spacing:-0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+k.value+'</div>'
        // Delta / sub
        +(k.delta !== null
          ? deltaEl(k.delta, k.deltaLabel)
          : '<div style="font-size:10px;color:#6B82A0;font-weight:600;height:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+k.deltaLabel+'</div>')
      +'</div>';
    }).join('')
  +'</div>';
}

/* ====================== CUSTOMER INSIGHTS ====================== */
function horizontalBarPanel(title, items, valueKey, fmtFn, barColor){
  if (!items || items.length === 0) {
    return '<div style="background:#FFFFFF;border:1px solid #E7ECF3;border-radius:10px;padding:18px;">'
      +'<div style="font-size:13px;font-weight:700;color:#15233B;margin-bottom:14px;">'+title+'</div>'
      +'<div style="font-size:11.5px;color:#94A3B8;text-align:center;padding:24px 0;">No data yet</div>'
    +'</div>';
  }
  var maxVal = Math.max.apply(null, items.map(function(it){ return it[valueKey]; }));
  var rows = items.map(function(it){
    var pct = maxVal > 0 ? Math.max(2, (it[valueKey] / maxVal) * 100) : 0;
    var label = it.name.length > 28 ? it.name.slice(0,26)+'…' : it.name;
    return '<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px;">'
      +'<div style="width:130px;flex-shrink:0;font-size:11px;color:#374151;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="'+esc(it.name)+'">'+esc(label)+'</div>'
      +'<div style="flex:1;background:#F1F5F9;border-radius:4px;height:18px;position:relative;overflow:hidden;">'
        +'<div style="background:'+barColor+';height:100%;border-radius:4px;width:'+pct+'%;transition:width 0.4s ease;"></div>'
      +'</div>'
      +'<div style="width:74px;flex-shrink:0;text-align:right;font-family:\'DM Mono\',monospace;font-size:11px;font-weight:700;color:#15233B;">'+fmtFn(it[valueKey])+'</div>'
    +'</div>';
  }).join('');
  return '<div style="background:#FFFFFF;border:1px solid #E7ECF3;border-radius:10px;padding:18px;">'
    +'<div style="font-size:13px;font-weight:700;color:#15233B;margin-bottom:14px;">'+title+'</div>'
    + rows
  +'</div>';
}

function roleBadge(role){
  var r = String(role||'').toLowerCase();
  var bg = '#EAF1FE', color = '#2563EB';
  if (r.indexOf('regional') >= 0) { bg = '#F1ECFB'; color = '#7A4FC0'; }
  else if (r.indexOf('zonal') >= 0) { bg = '#EAF1FE'; color = '#2563EB'; }
  else if (r.indexOf('sales') >= 0) { bg = '#E3F4EF'; color = '#138A6E'; }
  else if (r.indexOf('hr') >= 0) { bg = '#F7ECFB'; color = '#B26AC9'; }
  else if (r.indexOf('admin') >= 0) { bg = '#FEE4E2'; color = '#D64545'; }
  return '<span style="background:'+bg+';color:'+color+';font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:5px;white-space:nowrap;">'+esc(role)+'</span>';
}

function fmtLastLogin(iso){
  if (!iso) return '—';
  var d = new Date(iso);
  var dd = String(d.getDate()).padStart(2,'0');
  var mm = String(d.getMonth()+1).padStart(2,'0');
  var yyyy = d.getFullYear();
  var hh = String(d.getHours()).padStart(2,'0');
  var min = String(d.getMinutes()).padStart(2,'0');
  return dd+'/'+mm+'/'+yyyy+', '+hh+':'+min;
}

  var h = 0;
  for (var i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffff;

}

function buildSummaryCells(e, colLabels){
  var gpSeries=[sum(e.gp)].concat(e.gp);
  return gpSeries.map(function(v,i){

    return {
      val:dash?'\u2014':fmtCur(v),
      color:dash?'#C7CEDA':'#059669',
      bg:isFY?'#FFFBF0':'transparent',
      borderLeft:isFY?'2px solid #F0D9A8':'0',
      weight:isFY?700:600,
      entity:e.name, metric:'Gross Profit', col:colLabels[i], drillVal:dash?fmtCur(0):fmtCur(v)
    };
  });
}
function buildCells(fy, monthVals, type, baseColor, entityName, metricLabel, colLabels, noTarget, rawColKeys){
  // rawColKeys: the actual month labels used as keys (may differ from colLabels display in Yearly view)
  // If not provided, colLabels are the raw keys too
  var keys = rawColKeys || colLabels;
  var series=[fy].concat(monthVals);
  var isClickable = metricLabel !== 'Target' && metricLabel !== 'Achievement %';
  return series.map(function(v,i){
    var val, color=baseColor, isDash=false;
    if(noTarget && (type==='pct' || (type==='cur' && metricLabel==='Target'))){
      val='\u2014'; isDash=true;
    }
    else if(type==='int'){ if(v){val=v.toLocaleString('en-US');}else{val='\u2014';isDash=true;} }
    else if(type==='cur'){ val=fmtCur(v); }
    else if(type==='pct'){ val=v+'%'; color=v>=100?'#15875A':'#D64545'; }
    else if(type==='tons'){ if(v){val=v.toFixed(2);}else{val='\u2014';isDash=true;} }
    else if(type==='teu'){ if(v){val=v.toFixed(2);}else{val='\u2014';isDash=true;} }
    else if(type==='cbm'){ if(v){val=v.toFixed(2);}else{val='\u2014';isDash=true;} }
    else { val='\u2014'; isDash=true; }
    if(isDash) color='#C7CEDA';
    var isFY=i===0;
    // rawKey: what gets sent to the drill API as the month parameter
    // i===0 is the "FY Total" column — pass the actual filtered month range
    // so drill shows only the months visible in the table, not all months ever
    var rawKey;
    if (isFY) {
      if (state.reportView === 'Weekly') {
        // For Weekly view, "FY Total" for this row = sum across all displayed
        // weeks. Use an exact date range (first week's Monday → last week's
        // Sunday) rather than the month-label RANGE format, since week keys
        // aren't month labels.
        var wks = filteredWeekKeys();
        if (wks.length > 0) {
          var firstWk = isoWeekFromKey(wks[0]);
          var lastWk  = isoWeekFromKey(wks[wks.length-1]);
          var isoStart = firstWk.monday.toISOString().slice(0,10);
          var isoEnd   = lastWk.sunday.toISOString().slice(0,10);
          rawKey = 'DATERANGE:' + isoStart + ':' + isoEnd;
        } else {
          rawKey = 'FY Total';
        }
      } else {
        var fm = filteredMonths();
        if (fm.length === 0 || fm.length === months26.length) {
          rawKey = 'FY Total'; // all months = true FY Total
        } else {
          // Pass as a range: "RANGE:Jan-26:Jun-26" backend will filter inclusively
          rawKey = 'RANGE:' + fm[0] + ':' + fm[fm.length-1];
        }
      }
    } else {
      rawKey = keys[i] || colLabels[i];
    }
    return {val:val, color:color, bg:isFY?'#FFFBF0':'transparent', borderLeft:isFY?'2px solid #F0D9A8':'0', weight:isFY?600:500, entity:entityName, metric:metricLabel, col:rawKey, drillVal:val, clickable: isClickable && !isDash};
  });
}

function tableRows(){
  var isYearly = state.reportView === 'Yearly';
  var yGroups  = isYearly ? yearGroups() : null;

  // Build colLabels — yearly uses year labels, others use month labels
  var colLabels;
  if (isYearly) {
    colLabels = ['FY Total'].concat(yGroups.map(function(g){ return g.label; }));
  } else {
    colLabels = ['FY Total'].concat(filteredMonths().map(colDisplayLabel));
  }
  var ents = entities();
  var rows = [];

  ents.forEach(function(e){
    var isGrand = e.isGrand;
    var isZone  = e.isZone;
    var isRep   = e.isRep;
    var shipOpen = state.shipOpen[e.name] === true;
    var gpOpen   = state.gpOpen[e.name]   === true;

    var achFy = e.tgt > 0 ? Math.round(sum(e.gp) / (e.tgt * e.gp.length) * 100) : 0;

    // Zone-level background
    var groupBg = isGrand ? '#EEF3FC' : isZone ? '#F0F4FB' : '#FFFFFF';
    var avatarBg = e.avatarBg;

    // In Yearly view, aggregate monthly arrays into per-year totals
    var dispGp, dispShip, dispTons, dispTeus, dispLcl, dispTgt, dispAch, dispGpProv, dispGpActual;
    if (isYearly && yGroups) {
      dispGp     = yGroups.map(function(g){ return sum(g.idxs.map(function(i){ return e.gp[i]||0; })); });
      dispGpProv = yGroups.map(function(g){ return sum(g.idxs.map(function(i){ return (e.gpProv&&e.gpProv[i])||0; })); });
      dispGpActual=yGroups.map(function(g){ return sum(g.idxs.map(function(i){ return (e.gpActual&&e.gpActual[i])||0; })); });
      dispShip = yGroups.map(function(g){ return sum(g.idxs.map(function(i){ return e.ship[i]||0; })); });
      dispTons = yGroups.map(function(g){ return sum(g.idxs.map(function(i){ return (e.tons&&e.tons[i])||0; })); });
      dispTeus = yGroups.map(function(g){ return sum(g.idxs.map(function(i){ return (e.teu&&e.teu[i])||0; })); });
      dispLcl  = yGroups.map(function(g){ return sum(g.idxs.map(function(i){ return (e.lcl&&e.lcl[i])||0; })); });
      dispTgt  = yGroups.map(function(g){ return e.tgt * g.idxs.length; });
      dispAch  = yGroups.map(function(g){
        var gp  = sum(g.idxs.map(function(i){ return e.gp[i]||0; }));
        var tgt = e.tgt * g.idxs.length;
        return tgt > 0 ? Math.round(gp/tgt*100) : 0;
      });
    } else {
      dispGp     = e.gp;
      dispGpProv = e.gpProv   || e.gp.map(function(){ return 0; });
      dispGpActual=e.gpActual || e.gp.map(function(){ return 0; });
      dispShip = e.ship;
      dispTons = e.tons || e.gp.map(function(){ return 0; });
      dispTeus = e.teu  || e.gp.map(function(){ return 0; });
      dispLcl  = e.lcl  || e.gp.map(function(){ return 0; });
      dispTgt  = e.gp.map(function(){ return e.tgt; });
      dispAch  = e.gp.map(function(v){ return e.tgt ? Math.round(v/e.tgt*100) : 0; });
    }

    var teus    = dispTeus;
    var lcl     = dispLcl;
    var tgtArr  = dispTgt;
    var achArr  = dispAch;

    function metric(label, indent, type, color, vals, fy, toggleType, repInfo){
      var isShip = toggleType === 'ship';
      var isGP   = toggleType === 'gp';
      var isOpen = isShip ? shipOpen : isGP ? gpOpen : false;
      var arrowChar = (isShip || isGP) ? (isOpen ? '◄ ' : '► ') : '';
      // Individual reps have no real target data — show dash for Target/Achievement rows
      var noTarget = isRep && (label === 'Target' || label === 'Achievement %');

      // rawColKeys: what gets sent to the drill API as month parameter
      // Yearly view: year label "2025" → must resolve to "FY Total" for year col,
      //   or the actual first/last month for individual year groups
      // Weekly view: "Week 1" → actual month label e.g. "May-26"
      // Monthly/Custom/Quarterly: colLabels already are real month labels
      var rawColKeys;
      if (isYearly && yGroups) {
        // [0] = FY Total, then one key per year group
        // For drill: FY Total → "FY Total", year group → pass the year label so backend can match all its months
        // Better: pass a special key "YEAR:25" that openDrill resolves to a month range
        rawColKeys = ['FY Total'].concat(yGroups.map(function(g){ return 'YEAR:'+g.year; }));
      } else if (state.reportView === 'Weekly') {
        // Each week column now maps to its own exact ISO week (Mon-Sun) —
        // drill-down filters precisely to that week's date range.
        rawColKeys = ['FY Total'].concat(filteredWeekKeys().map(function(wk){ return 'WEEK:'+wk; }));
      } else {
        rawColKeys = null; // colLabels are already real month labels
      }

      return {
        type:'metric', label:label, padLeft:(52+indent*18)+'px', labelColor:color,
        labelWeight:indent?500:600, labelStyle:indent?'italic':'normal',
        caret:arrowChar, toggleType:toggleType||false, entityName:e.name,
        repInfo:repInfo||null, rowBg: groupBg, isZoneBlock: isZone, isGrandBlock: isGrand,
        cells:buildCells(fy, vals, type, color, e.name, label, colLabels, noTarget, rawColKeys)
      };
    }

    var nameWeight = isGrand ? 700 : isZone ? 700 : 600;
    var barColor   = achFy>=100?'#15875A':achFy<50?'#E08A2B':'#2F6FED';
    var achColor   = achFy>=100?'#15875A':achFy<50?'#C26A12':'#2F6FED';

    var repInfo = {
      name: e.name, initials: e.initials, avatarBg: avatarBg,
      nameWeight: nameWeight, groupBg: groupBg,
      achFmt: e.tgt>0 ? achFy+'%' : '—',
      barWidth: Math.min(100,achFy)+'%',
      barColor: barColor, achColor: achColor,
      isZone: isZone, isGrand: isGrand, isBranch: !!e.isBranch
    };

    rows.push(metric('Shipments', 0, 'int', '#15233B', dispShip, sum(dispShip), 'ship', repInfo));

    if (shipOpen) {
      rows.push(metric('Tons (Air)',         1, 'tons', '#5B8DEF', dispTons, sum(dispTons), false));
      rows.push(metric('TEUs (Ocean)',       1, 'teu',  '#5B8DEF', teus, sum(teus), false));
      rows.push(metric('LCL (Ocean in CBM)', 1, 'cbm',  '#9AA4B2', lcl, sum(lcl), false));
    }

    rows.push(metric('GP', 0, 'cur', '#374151', dispGp, sum(dispGp), 'gp'));

    if (gpOpen) {
      rows.push(metric('Actual Profit',      1, 'cur', '#1D5FCC', dispGpActual, sum(dispGpActual), false));
      rows.push(metric('Provisional Profit', 1, 'cur', '#10875A', dispGpProv,   sum(dispGpProv),   false));
    }

    rows.push(metric('Target',        0, 'cur', '#374151', tgtArr,  sum(tgtArr), false));
    rows.push(metric('Achievement %', 0, 'pct', '#374151', achArr,  achFy,       false));
  });

  return rows;
}

    +'<th style="position:sticky;left:0;z-index:3;background:#F0F4FA;text-align:left;padding:7px 12px;font-size:10px;font-weight:700;letter-spacing:0.05em;color:#475569;text-transform:uppercase;border-bottom:2px solid '+BORDER_STRONG+';box-shadow:inset -1.5px 0 0 '+BORDER_STRONG+';width:210px;min-width:210px;">Zones/Sales Rep</th>'

    : colLabels.slice(1).map(function(l){

        return '<th style="text-align:right;padding:7px 10px;font-size:10px;font-weight:700;letter-spacing:0.05em;color:#475569;text-transform:uppercase;border-bottom:2px solid '+BORDER_STRONG+';border-right:1px solid '+BORDER+';background:#F0F4FA;white-space:nowrap;">'+l+'</th>';
      }).join(''))
  +'</tr>';

  var allRows = tableRows();

  // Pre-compute block boundaries: for each row, find which row index within

  var blockMiddleIdx = [];
  var blockRepInfo   = [];

  {
    var bi = 0;

        while (bj < allRows.length && !allRows[bj].repInfo) bj++;
        var mid = bi + Math.floor((bj - bi - 1) / 2);
        for (var bk = bi; bk < bj; bk++) {
          blockMiddleIdx[bk]   = mid;
          blockRepInfo[bk]     = allRows[bi].repInfo;
          blockIsZone[bk]      = allRows[bi].isZoneBlock;
          blockIsGrand[bk]     = allRows[bi].isGrandBlock;
          blockEntityName[bk]  = allRows[bi].entityName;

        bi = bj;
      } else {
        blockMiddleIdx[bi] = bi;

  }

  var body = allRows.map(function(row, idx){
    var ri = blockRepInfo[idx] || row.repInfo;
    var rowBg = row.rowBg || (ri ? ri.groupBg : '#FFFFFF');
    var isZoneRow  = blockIsZone[idx]  || row.isZoneBlock;

    var blockEntity = blockEntityName[idx] || row.entityName;
    var isFirstOfBlock = !!row.repInfo; // literal first row of a block always carries repInfo
    var isMiddleOfBlock = (blockMiddleIdx[idx] === idx);
    var isLastRowOverall = idx === allRows.length - 1;

    var allCells = row.cells.map(function(c, ci){
      var isFY = ci === 0;
      var stickyStyle = isFY ? ('position:sticky;left:'+FY_COL_LEFT+'px;z-index:2;') : '';
      var cellBg = isFY ? (rowBg !== '#FFFFFF' ? rowBg : '#FCF9EE') : (rowBg !== '#FFFFFF' ? rowBg : c.bg);
      // FY column is sticky — use inset box-shadow for its dividers so they

      var clickAttrs = c.clickable

      var cursorStyle = c.clickable ? 'cursor:pointer;' : '';
      return '<td'+clickAttrs+' style="'+stickyStyle+borderStyle+cursorStyle+'text-align:right;padding:6px 10px;font-family:\'DM Mono\',monospace;font-size:11px;font-weight:'+c.weight+';color:'+c.color+';background:'+cellBg+';white-space:nowrap;">'+c.val+'</td>';

    var labelContent;

    var labelCell = '<div style="display:flex;align-items:center;"'+actAttr+'>'+labelContent+'</div>';

    // Block separators are noticeably darker/thicker than regular row dividers.

      } else if (isZoneRow) {

          +'<div style="font-size:11px;font-weight:600;color:#1E3A66;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="'+esc(ri.name)+'">'+ri.name+'</div>'
        +'</div>';
      }

      var zoneToggle = '';
      if (isZoneRow) {
        var zCollapsed = state.zoneOpen[blockEntity] === false;
        var chevSvg = zCollapsed
          ? '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>'
          : '<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
        // Toggle sits immediately after the name — no auto-margin push, stays close and compact
        zoneToggle = '<div data-act="zoneToggle" data-zone="'+esc(blockEntity)+'" style="width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,'+BRAND_A1+','+BRAND_A2+');display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;box-shadow:0 1px 3px rgba(30,58,102,0.3);">'+chevSvg+'</div>';
      }
      // Zone rows get a bold left-edge navy accent bar to visually anchor them
      var leftAccent = isZoneRow ? 'box-shadow:inset 3px 0 0 '+BRAND_A1+', inset -1.5px 0 0 '+BORDER_STRONG+';' : isGrandRow ? 'box-shadow:inset 3px 0 0 '+BRAND_A2+', inset -1.5px 0 0 '+BORDER_STRONG+';' : 'box-shadow:inset -1.5px 0 0 '+BORDER_STRONG+';';
      nameCell = '<td style="position:sticky;left:0;background:'+rowBg+';padding:6px 8px 6px 10px;z-index:2;width:210px;min-width:210px;max-width:210px;text-align:left;'+leftAccent+'"><div style="display:flex;align-items:center;justify-content:flex-start;gap:6px;min-width:0;">'+avatarEl+nameLabel+zoneToggle+'</div></td>';
