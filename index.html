/* ====================== HELPERS ====================== */
function fmtCur(v){
  var rate = state.currency==='THB'?32.5:1;
  var sym = state.currency==='THB'?'\u0E3F':'$';
  return sym + Math.round(v*rate).toLocaleString('en-US');
}
function initials(name){return name.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}
function sum(a){return a.reduce(function(x,y){return x+y;},0);}
function sparkOf(arr){
  var max=Math.max.apply(null,arr), min=Math.min.apply(null,arr);
  var W=104,H=30,pad=4;
  return arr.map(function(v,i){
    var x=pad+i*((W-2*pad)/(arr.length-1));
    var y=(H-pad)-((v-min)/((max-min)||1))*(H-2*pad);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
}
function heat(ratio){
  if(ratio>=1.05)return{bg:'#CFEBDD',color:'#0E6B45'};
  if(ratio>=0.85)return{bg:'#E3F5EA',color:'#15875A'};
  if(ratio>=0.6)return{bg:'#FBF1DA',color:'#946312'};
  if(ratio>=0.35)return{bg:'#FBE6D2',color:'#A85B17'};
  if(ratio>0)return{bg:'#FBDED9',color:'#B83A2B'};
  return{bg:'transparent',color:'#C7CEDA'};
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

/* ====================== DERIVED MODEL ====================== */
function model(){
  var gpGrand=sum(repsRaw.map(function(r){return sum(r.gp);}));
  var shipGrand=sum(repsRaw.map(function(r){return sum(r.ship);}));
  var tgtGrand=sum(repsRaw.map(function(r){return r.tgt*6;}));
  var achGrand=Math.round(gpGrand/tgtGrand*100);
  var teusGrand=sum(repsRaw.map(function(r){return sum(r.ship.map(function(s){return Math.round(s*2.6);}));}));
  return {gpGrand:gpGrand, shipGrand:shipGrand, tgtGrand:tgtGrand, achGrand:achGrand, teusGrand:teusGrand};
}

function grandEntity(){
  return {
    name:'Grand Total', initials:'GT', avatarBg:'oklch(0.5 0.14 262)',
    ship:months.map(function(_,i){return sum(repsRaw.map(function(r){return r.ship[i];}));}),
    gp:months.map(function(_,i){return sum(repsRaw.map(function(r){return r.gp[i];}));}),
    tank:months.map(function(_,i){return sum(repsRaw.map(function(r){return r.tank[i];}));}),
    tgt:sum(repsRaw.map(function(r){return r.tgt;}))
  };
}
function entities(){
  return [grandEntity()].concat(repsRaw.map(function(r){
    return {name:r.name, initials:initials(r.name), avatarBg:'oklch(0.6 0.12 '+r.hue+')', ship:r.ship, gp:r.gp, tank:r.tank, tgt:r.tgt};
  }));
}

/* ====================== DRILL-DOWN ====================== */
function genShipments(entity, metric, col){
  var routes=[['Bangkok','Los Angeles'],['Laem Chabang','Rotterdam'],['Bangkok','Hamburg'],['Map Ta Phut','Singapore'],['Bangkok','Jebel Ali'],['Laem Chabang','Shanghai'],['Bangkok','Sydney'],['Laem Chabang','Long Beach']];
  var modes=[{n:'FCL',c:'#2F6FED',b:'#EAF1FE'},{n:'LCL',c:'#138A6E',b:'#E3F4EF'},{n:'Air',c:'#7A4FC0',b:'#F1ECFB'},{n:'Tank',c:'#B26AC9',b:'#F7ECFB'}];
  var stats=[{n:'Delivered',c:'#15875A'},{n:'In transit',c:'#2F6FED'},{n:'Customs hold',c:'#C7891E'}];
  // Get real GP total for this entity+col
  var repData = repsRaw.find(function(r){ return r.name===entity; });
  var monthIdx = months26.indexOf(col);
  var totalGP = 0;
  if(repData && monthIdx>=0){ totalGP = repData.gp[monthIdx]; }
  else if(entity==='Grand Total' && monthIdx>=0){ totalGP = sum(repsRaw.map(function(r){ return r.gp[monthIdx]; })); }
  else if(repData){ totalGP = sum(repData.gp); } // FY Total
  else { totalGP = sum(repsRaw.map(function(r){ return sum(r.gp); })); }
  // Generate shipments that sum to real GP
  var seed=0, key=entity+col;
  for(var i=0;i<key.length;i++) seed=(seed*31+key.charCodeAt(i))>>>0;
  function rnd(){seed=(seed*1664525+1013904223)>>>0;return seed/4294967296;}
  var shipCount = repData ? (monthIdx>=0 ? repData.ship[monthIdx] : sum(repData.ship)) : (monthIdx>=0 ? sum(repsRaw.map(function(r){return r.ship[monthIdx];})) : sum(repsRaw.map(function(r){return sum(r.ship);})));
  var n = Math.max(1, Math.min(shipCount, 8));
  var out=[], remaining=totalGP;
  for(var j=0;j<n;j++){
    var r=routes[Math.floor(rnd()*routes.length)];
    var m=modes[Math.floor(rnd()*modes.length)];
    var s=stats[Math.floor(rnd()*stats.length)];
    var teus=1+Math.floor(rnd()*3);
    var gpRaw = j===n-1 ? Math.max(0,remaining) : Math.round(remaining*(0.1+rnd()*0.4));
    remaining -= gpRaw;
    out.push({jobNo:'SAR-26-'+(10000+Math.floor(rnd()*89999)), origin:r[0], dest:r[1], mode:m.n, modeColor:m.c, modeBg:m.b, teus:teus+' TEU', gpRaw:gpRaw, gpFmt:fmtCur(gpRaw), status:s.n, statusColor:s.c});
  }
  return out;
}

function buildSummaryCells(e, colLabels){
  var gpSeries=[sum(e.gp)].concat(e.gp);
  return gpSeries.map(function(v,i){
    var isFY=i===0, dash=!v;
    return {
      val:dash?'\u2014':fmtCur(v),
      color:dash?'#C7CEDA':'#059669',
      bg:isFY?'#FFFBF0':'transparent',
      borderLeft:isFY?'2px solid #F0D9A8':'0',
      weight:isFY?700:600,
      entity:e.name, metric:'Gross Profit', col:colLabels[i], drillVal:dash?fmtCur(0):fmtCur(v)
    };
  });
}
function buildCells(fy, monthVals, type, baseColor, entityName, metricLabel, colLabels){
  var series=[fy].concat(monthVals);
  return series.map(function(v,i){
    var val, color=baseColor, isDash=false;
    if(type==='int'){ if(v){val=v.toLocaleString('en-US');}else{val='\u2014';isDash=true;} }
    else if(type==='cur'){ val=fmtCur(v); }
    else if(type==='pct'){ val=v+'%'; color=v>=100?'#15875A':'#D64545'; }
    else { val='\u2014'; isDash=true; }
    if(isDash) color='#C7CEDA';
    var isFY=i===0;
    return {val:val, color:color, bg:isFY?'#FFFBF0':'transparent', borderLeft:isFY?'2px solid #F0D9A8':'0', weight:isFY?600:500, entity:entityName, metric:metricLabel, col:colLabels[i], drillVal:val};
  });
}

function tableRows(){
  var colLabels=['FY Total'].concat(months26);
  var ents=entities();
  var rows=[];
  ents.forEach(function(e,ei){
    var isGrand=ei===0;
    var shipOpen=state.shipOpen[e.name]===true;
    var achFy=e.tgt>0?Math.round(sum(e.gp)/(e.tgt*6)*100):0;
    var last=e.gp[5], prev=e.gp[4], momPct=prev?Math.round((last-prev)/prev*100):0;
    // rep name is shown inline with Shipments row

    var teus=e.ship.map(function(s){return Math.round(s*2.6);});
    var fcl=teus.map(function(t,i){return t-e.tank[i];});
    var lcl=months.map(function(){return 0;});
    var tons=months.map(function(){return 0;});
    var tgtArr=months.map(function(){return e.tgt;});
    var achArr=months.map(function(_,i){return e.tgt?Math.round(e.gp[i]/e.tgt*100):0;});
    function metric(label,indent,type,color,vals,fy,toggleType,repInfo,clickable){
      var isShip = toggleType==='ship';
      var isTons = false;
      var isOpen = isShip ? shipOpen : false;
      var arrowChar = isShip ? (isOpen ? '◄ ' : '► ') : '';
      return {type:'metric', label:label, padLeft:(52+indent*18)+'px', labelColor:color,
        labelWeight:indent?500:600, labelStyle:indent?'italic':'normal',
        caret:arrowChar, toggleType:toggleType||false, entityName:e.name,
        repInfo:repInfo||null,
        cells:buildCells(fy,vals,type,color,e.name,label,colLabels,clickable!==false)};
    }
    rows.push(metric('Shipments',0,'int','#15233B',e.ship,sum(e.ship),'ship',{name:e.name,initials:e.initials,avatarBg:e.avatarBg,nameWeight:isGrand?700:600,groupBg:isGrand?'#F1F6FF':'#FCFDFF',achFmt:e.tgt>0?achFy+'%':'—',barWidth:Math.min(100,achFy)+'%',barColor:achFy>=100?'#15875A':achFy<50?'#E08A2B':'#2F6FED',achColor:achFy>=100?'#15875A':achFy<50?'#C26A12':'#2F6FED'}));
    if(shipOpen){
      rows.push(metric('Tons',1,'int','#2F6FED',teus,sum(teus),false));
      rows.push(metric('TEUs (Ocean)',1,'int','#5B8DEF',teus,sum(teus),false));
      rows.push(metric('LCL (Ocean in CBM)',1,'dash','#9AA4B2',lcl,0,false));
    }
    rows.push(metric('GP',0,'cur','#374151',e.gp,sum(e.gp),false));
    rows.push(metric('Target',0,'cur','#374151',tgtArr,e.tgt*6,false,false));
    rows.push(metric('Achievement %',0,'pct','#374151',achArr,achFy,false,false));
  });
  return rows;
}

function leaderboard(){
  var M = model();
  // Sort reps by GP total descending
  var sorted = repsRaw.map(function(r){
    var gpTotal = sum(r.gp);
    var shipTotal = sum(r.ship);
    var tgtTotal = r.tgt * 6;
    var ach = tgtTotal > 0 ? gpTotal / tgtTotal : 0;
    var achPct = Math.round(ach * 100);
    var last = r.gp[5], prev = r.gp[4];
    var momPct = prev ? Math.round((last - prev) / prev * 100) : 0;
    var trend = last > prev ? 'up' : last < prev ? 'down' : 'flat';
    return { name:r.name, hue:r.hue, gpTotal:gpTotal, shipTotal:shipTotal,
      tgtTotal:tgtTotal, achPct:achPct, ach:ach, momPct:momPct, trend:trend,
      gp:r.gp, tgt:r.tgt };
  }).sort(function(a,b){ return b.gpTotal - a.gpTotal; });

  var medals = ['🥇','🥈','🥉'];

  // Sparkline helper
  function spark(arr, color){
    var max=Math.max.apply(null,arr), min=Math.min.apply(null,arr);
    var W=80, H=24, pad=2;
    var pts = arr.map(function(v,i){
      var x = pad + i*((W-2*pad)/(arr.length-1));
      var y = (H-pad) - ((v-min)/((max-min)||1))*(H-2*pad);
      return x.toFixed(1)+','+y.toFixed(1);
    }).join(' ');
    return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="overflow:visible;">'
      +'<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
      +'</svg>';
  }

  // Top 3 podium
  var podium = '';
  if(sorted.length >= 3){
    var order = [sorted[1], sorted[0], sorted[2]]; // 2nd, 1st, 3rd
    var heights = ['80px','110px','60px'];
    var podColors = ['#94A3B8','#F59E0B','#CD7C3A'];

    podium = '<div style="display:flex;align-items:flex-end;justify-content:center;gap:12px;margin-bottom:28px;padding:24px 0 0;">';

        +'<div style="text-align:center;">'

  // Full rankings table
  var rows = sorted.map(function(r, i){

    var ini = r.name.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
    var trendColor = r.trend==='up'?'#15875A':r.trend==='down'?'#DC2626':'#94A3B8';
    var trendIcon = r.trend==='up'?'▲':r.trend==='down'?'▼':'—';
    var achColor = r.achPct>=100?'#15875A':r.achPct>=50?'#2563EB':'#DC2626';
    var barW = Math.min(100, r.achPct);
    var barColor = r.achPct>=100?'#15875A':r.achPct>=50?'#2563EB':'#F59E0B';
    var rankBg = i===0?'#FEF3C7':i===1?'#F1F5F9':i===2?'#FEF0E7':'transparent';
    var sparkColor = r.trend==='up'?'#15875A':'#DC2626';
    return '<tr style="border-bottom:1px solid #E2E8F0;background:'+rankBg+';">'
      // rank
      +'<td style="padding:8px 12px;font-size:13px;font-weight:700;color:#64748B;width:36px;text-align:center;">'+(i<3?medals[i]:'#'+(i+1))+'</td>'
      // name
      +'<td style="padding:8px 12px;">'
        +'<div style="display:flex;align-items:center;gap:9px;">'
          +'<div style="width:28px;height:28px;border-radius:50%;background:'+avatarBg+';color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+ini+'</div>'

        +'</div>'

      // GP

      // Target

          +'<div style="flex:1;height:6px;background:#E2E8F0;border-radius:99px;overflow:hidden;">'
            +'<div style="height:100%;width:'+barW+'%;background:'+barColor+';border-radius:99px;"></div>'
          +'</div>'
          +'<span style="font-size:11px;font-weight:700;color:'+achColor+';width:36px;text-align:right;">'+(r.tgtTotal>0?r.achPct+'%':'—')+'</span>'
        +'</div>'
      +'</td>'
      // Shipments
      +'<td style="padding:8px 12px;text-align:right;font-family:\'DM Mono\',monospace;font-size:12px;color:#374151;">'+r.shipTotal+'</td>'
      // Trend sparkline
      +'<td style="padding:8px 12px;">'+spark(r.gp, sparkColor)+'</td>'
      // MoM
      +'<td style="padding:8px 12px;text-align:right;white-space:nowrap;">'
        +'<span style="font-size:11.5px;font-weight:600;color:'+trendColor+';">'+trendIcon+' '+(r.momPct>0?'+':'')+r.momPct+'%</span>'
      +'</td>'
    +'</tr>';
  }).join('');

  return '<div style="background:#FFFFFF;border:1px solid #CBD5E1;border-radius:12px;box-shadow:0 1px 3px rgba(20,35,59,0.08);overflow:hidden;">'
    // header — same structure as sales table so Back button is in same spot
    +'<div style="padding:9px 14px;border-bottom:1px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;">'
      +'<div>'
        +'<span style="font-size:12.5px;font-weight:700;color:#15233B;">Leaderboard</span>'
        +'<span style="font-size:11px;color:#64748B;font-weight:500;margin-left:8px;">'+state.currency+'</span>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:10px;">'
        +'<span style="font-size:10.5px;color:#94A3B8;font-weight:500;">Jan-26 – Jun-26</span>'
        +'<button data-act="page" data-val="sales" class="btnq" style="display:flex;align-items:center;gap:5px;background:#2563EB;border:1px solid #2563EB;border-radius:6px;padding:4px 9px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Close</button>'
      +'</div>'
    +'</div>'
    // podium
    + podium
    // table
    +'<div style="overflow-x:auto;">'
      +'<table style="width:100%;border-collapse:collapse;">'
        +'<thead style="background:#F8FAFC;">'
          +'<tr>'
            +'<th style="padding:7px 12px;font-size:9.5px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:0.05em;border-bottom:2px solid #CBD5E1;text-align:center;width:36px;">#</th>'
            +'<th style="padding:7px 12px;font-size:9.5px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:0.05em;border-bottom:2px solid #CBD5E1;text-align:left;">Sales Rep</th>'
            +'<th style="padding:7px 12px;font-size:9.5px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:0.05em;border-bottom:2px solid #CBD5E1;text-align:right;">Gross Profit</th>'
            +'<th style="padding:7px 12px;font-size:9.5px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:0.05em;border-bottom:2px solid #CBD5E1;text-align:right;">Target</th>'
            +'<th style="padding:7px 12px;font-size:9.5px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:0.05em;border-bottom:2px solid #CBD5E1;text-align:left;min-width:140px;">Achievement</th>'
            +'<th style="padding:7px 12px;font-size:9.5px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:0.05em;border-bottom:2px solid #CBD5E1;text-align:right;">Shipments</th>'
            +'<th style="padding:7px 12px;font-size:9.5px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:0.05em;border-bottom:2px solid #CBD5E1;text-align:left;">GP Trend</th>'
            +'<th style="padding:7px 12px;font-size:9.5px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:0.05em;border-bottom:2px solid #CBD5E1;text-align:right;">MoM</th>'
          +'</tr>'
        +'</thead>'
        +'<tbody>'+rows+'</tbody>'
      +'</table>'
    +'</div>'
  +'</div>';
}

  var stars = [1,2,3,4,5].map(function(n){
    var filled = n <= state.feedbackRating;
    return '<span data-act="setRating" data-val="'+n+'" style="font-size:22px;cursor:pointer;color:'+(filled?'#F59E0B':'#CBD5E1')+';transition:color 0.1s;">★</span>';
  }).join('');
  var body = state.feedbackSent
    ? '<div style="padding:28px 24px;text-align:center;">'
        +'<div style="font-size:32px;margin-bottom:12px;">🎉</div>'
        +'<div style="font-size:15px;font-weight:700;color:#15233B;margin-bottom:6px;">Thank you!</div>'
        +'<div style="font-size:12.5px;color:#64748B;">Your feedback has been submitted.</div>'
        +'<button data-act="feedbackClose" style="margin-top:18px;border:none;background:#2563EB;color:#fff;border-radius:7px;padding:8px 24px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">Close</button>'
      +'</div>'
    : '<div style="padding:20px 22px;">'
        +'<div style="font-size:14px;font-weight:700;color:#15233B;margin-bottom:4px;">Share your feedback</div>'
        +'<div style="font-size:11.5px;color:#64748B;margin-bottom:16px;">Help us improve SAR_IN - Air dashboard</div>'
        +'<div style="margin-bottom:14px;">'
          +'<div style="font-size:11px;font-weight:600;color:#374151;margin-bottom:6px;">How would you rate your experience?</div>'
          +'<div style="display:flex;gap:4px;">'+stars+'</div>'
        +'</div>'
        +'<div style="margin-bottom:16px;">'
          +'<div style="font-size:11px;font-weight:600;color:#374151;margin-bottom:6px;">Comments</div>'
          +'<textarea id="feedback-text" placeholder="What do you like or what can be improved?" style="width:100%;height:80px;border:1px solid #E2E8F0;border-radius:7px;padding:8px 10px;font-size:12px;font-family:inherit;resize:none;outline:none;color:#15233B;" >'+state.feedbackText+'</textarea>'
        +'</div>'
        +'<div style="display:flex;justify-content:flex-end;gap:8px;">'
          +'<button data-act="feedbackClose" style="border:1px solid #E2E8F0;background:#FFFFFF;border-radius:7px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;color:#374151;font-family:inherit;">Cancel</button>'
          +'<button data-act="feedbackSubmit" style="border:none;background:#2563EB;color:#fff;border-radius:7px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">Submit</button>'
        +'</div>'
      +'</div>';

  return '<div data-act="feedbackClose" style="position:fixed;inset:0;background:rgba(15,23,40,0.4);z-index:300;display:flex;align-items:center;justify-content:center;animation:ovFade 0.15s ease;">'
    +'<div data-stop="1" style="background:#FFFFFF;border-radius:12px;box-shadow:0 20px 60px rgba(15,23,40,0.18);width:380px;max-width:94vw;overflow:hidden;animation:drwSlide 0.2s cubic-bezier(0.22,1,0.36,1);">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #F1F5F9;">'
        +'<div style="display:flex;align-items:center;gap:8px;">'
          +'<div style="width:28px;height:28px;background:#EFF4FF;border-radius:7px;display:flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>'
          +'<span style="font-size:13px;font-weight:700;color:#15233B;">Feedback</span>'
        +'</div>'
        +'<button data-act="feedbackClose" style="border:none;background:#F1F5F9;width:26px;height:26px;border-radius:6px;cursor:pointer;color:#64748B;font-size:14px;display:flex;align-items:center;justify-content:center;">✕</button>'
      +'</div>'
      +body

  +'</div>';

function render(){
  var M=model();
  var app=document.getElementById('app');
  // Only rebuild sidebar on first load — avoids sidebar scroll jump
  if(!app.querySelector('aside')){
    app.innerHTML=sidebar()+'<div id="main-col" style="flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden;"><div id="topbar-slot"></div><main id="main-slot" style="flex:1;overflow-y:auto;padding:10px 14px 20px;"></main></div><div id="drawer-slot"></div>';
  }
  var mainEl=document.getElementById('main-slot');
  var scrollTop=mainEl?mainEl.scrollTop:0;
  // Update only topbar, main content, drawer — sidebar untouched
  document.getElementById('topbar-slot').innerHTML=topbar();
  mainEl.innerHTML=kpiRow(M)+(state.page==='leaderboard'?leaderboard():salesTable(M));
  document.getElementById('drawer-slot').innerHTML=drawer()+feedbackModal();
  if(scrollTop) mainEl.scrollTop=scrollTop;
}
function renderKeepTopbar(){
  // Re-render everything EXCEPT topbar — used when date inputs change
  // so the native date picker doesn't get destroyed mid-interaction
  var M=model();
  var mainEl=document.getElementById('main-slot');
  var scrollTop=mainEl?mainEl.scrollTop:0;
  if(mainEl) mainEl.innerHTML=kpiRow(M)+(state.page==='leaderboard'?leaderboard():salesTable(M));
  var drawerEl=document.getElementById('drawer-slot');
  if(drawerEl) drawerEl.innerHTML=drawer()+feedbackModal();
  if(scrollTop) mainEl.scrollTop=scrollTop;
}

function openDrill(entity, metric, col, valueFmt){
  var ships=genShipments(entity,metric,col);
  var total=sum(ships.map(function(s){return s.gpRaw;}));
  state.drill={entity:entity, metric:metric, col:col, valueFmt:valueFmt, shipments:ships, totalFmt:fmtCur(total), count:ships.length};
  render();
}

document.addEventListener('change', function(ev){
  var el=ev.target;
  if(el.getAttribute('data-act')==='setFrom'){ ev.stopPropagation(); state.dateFrom=el.value; renderKeepTopbar(); }
  else if(el.getAttribute('data-act')==='setTo'){ ev.stopPropagation(); state.dateTo=el.value; renderKeepTopbar(); }
  else if(el.getAttribute('data-act')==='rateCommit'){ var v=parseFloat(el.value); if(!isNaN(v)&&v>0) state.rate=v; state.rateEditing=false; render(); }
});
document.addEventListener('click', function(ev){
  var el=ev.target.closest('[data-act]');
  if(!el) return;
  var act=el.getAttribute('data-act');
  if(act==='page'){ ev.stopPropagation(); ev.preventDefault(); state.page=el.getAttribute('data-val'); render(); }
  else if(act==='rateEdit'){ state.rateEditing=true; render(); setTimeout(function(){ var inp=document.getElementById('rate-input'); if(inp) inp.focus(); },50); }
  else if(act==='rateCommit'){ var v=parseFloat(document.getElementById('rate-input').value); if(!isNaN(v)&&v>0) state.rate=v; state.rateEditing=false; render(); }
  else if(act==='feedbackOpen'){ ev.stopPropagation(); state.feedbackOpen=true; state.feedbackSent=false; state.feedbackText=''; state.feedbackRating=0; render(); }
  else if(act==='feedbackClose'){ if(ev.target.closest('[data-stop]')&&!el.matches('[data-act="feedbackClose"]')) return; state.feedbackOpen=false; render(); }
  else if(act==='setRating'){ ev.stopPropagation(); state.feedbackRating=parseInt(el.getAttribute('data-val')); render(); }
  else if(act==='feedbackSubmit'){ ev.stopPropagation(); var ta=document.getElementById('feedback-text'); if(ta) state.feedbackText=ta.value; state.feedbackSent=true; render(); }
  else if(act==='toggleViewDrop'){ ev.stopPropagation(); state.viewDropOpen=!state.viewDropOpen; render(); }
  else if(act==='setView'){ ev.stopPropagation(); state.reportView=el.getAttribute('data-val'); state.viewDropOpen=false; render(); }
  else if(act==='cur'){ ev.stopPropagation(); ev.preventDefault(); state.currency=el.getAttribute('data-cur'); render(); }
  else if(act==='shipToggle'){ ev.stopPropagation(); var n=el.getAttribute('data-name'); state.shipOpen[n]=!state.shipOpen[n]; render(); }
  else if(act==='drill'){ ev.stopPropagation(); openDrill(el.getAttribute('data-entity'),el.getAttribute('data-metric'),el.getAttribute('data-col'),el.getAttribute('data-val')); }
  else if(act==='close'){ if(ev.target.closest('[data-stop]') && !el.matches('[data-act="close"]')) return; state.drill=null; render(); }
});
document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ if(state.viewDropOpen){ state.viewDropOpen=false; render(); } else if(state.drill){ state.drill=null; render(); } } });
document.addEventListener('click', function(e){ if(state.viewDropOpen && !e.target.closest('[data-act="toggleViewDrop"]') && !e.target.closest('[data-act="setView"]')){ state.viewDropOpen=false; render(); } }, true);

async function handleCredential(response) {
  var loginCard = document.querySelector('.login-card');
  loginCard.innerHTML = '<div style="padding:40px;text-align:center;color:#64748B;"><div style="font-size:28px;margin-bottom:12px;">⏳</div><div style="font-weight:600;margin-bottom:6px;">Verifying...</div></div>';

  try {
    var res  = await fetch(API_BASE + '/api/mongo', {
      method  : 'POST',
      headers : { 'Content-Type':'application/json' },
      body    : JSON.stringify({ idToken: response.credential })
    });
    var data = await res.json();

    if (!res.ok) {
      loginCard.innerHTML = '<div style="padding:40px;text-align:center;">'
        + '<div style="font-size:28px;margin-bottom:12px;">🚫</div>'
        + '<div style="font-weight:700;font-size:15px;color:#DC2626;margin-bottom:8px;">' + (res.status===403?'Access Denied':'Sign-in Failed') + '</div>'
        + '<div style="font-size:12.5px;color:#64748B;margin-bottom:20px;">' + (data.message||data.error||'Please try again.') + '</div>'
        + '<button onclick="location.reload()" style="background:#2563EB;color:#fff;border:none;padding:9px 22px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;">Try Again</button>'
        + '</div>';
      return;
    }

    // Success — hide login, show dashboard
    var user = data.user;
    document.getElementById('login-screen').style.display = 'none';

    // Update sidebar with real user info
    var sidebarFooter = document.querySelector('#app aside > div:last-child');
    if (sidebarFooter) {
      var ini = user.name.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
      sidebarFooter.innerHTML = '<div style="width:26px;height:26px;border-radius:50%;background:oklch(0.6 0.12 255);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + ini + '</div>'
        + '<div style="font-size:10px;color:#8B97A8;font-weight:500;line-height:1.4;">' + user.name + '<br><span style="color:#15875A;">● ' + user.role + '</span></div>';
    }

    // Load live data
    fetchLiveData();

  } catch(err) {
    loginCard.innerHTML = '<div style="padding:40px;text-align:center;">'
      + '<div style="font-size:28px;margin-bottom:12px;">⚠️</div>'
      + '<div style="font-weight:600;font-size:15px;margin-bottom:8px;">Network Error</div>'
      + '<div style="font-size:12px;color:#64748B;margin-bottom:20px;">' + err.message + '</div>'
      + '<button onclick="location.reload()" style="background:#2563EB;color:#fff;border:none;padding:9px 22px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;">Retry</button>'
      + '</div>';
  }
}
