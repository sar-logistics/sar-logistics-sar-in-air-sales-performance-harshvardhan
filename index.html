<script>
/* ====================== AUTH ====================== */
// Bump this whenever aggregation/data logic changes — invalidates all
// existing browser caches instantly, even though MongoDB data itself
// hasn't changed (so the meta-timestamp check alone wouldn't catch it).
var CACHE_VERSION = 'v3';
var GOOGLE_CLIENT_ID = '71401290862-it2v6ru4et49diahsv4j63h07pm68thr.apps.googleusercontent.com';
var currentUser = null;
var tokenClient = null;

// Initialise the token client once the GSI library is ready
// We use initTokenClient (implicit flow) — gives us an access_token we can
// exchange for an id_token via Google's userinfo endpoint, all client-side.
function initGoogleAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'openid email profile',
    callback: handleTokenResponse,
    error_callback: function(err) {
      console.error('OAuth error:', err);
      showLoginError('Sign-in failed. Please try again.');
      resetSignInButton();
    }
  });
}

function startGoogleSignIn() {
  hideLoginError();
  var btn = document.getElementById('google-signin-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="login-spinner"></div> Signing in…';

  if (!tokenClient) {
    showLoginError('Google Sign-In is still loading. Please wait a moment and try again.');
    resetSignInButton();
    return;
  }
  // This opens the real Google account picker popup on button click
  tokenClient.requestAccessToken({ prompt: 'select_account' });
}

function handleTokenResponse(tokenResponse) {
  if (tokenResponse.error) {
    resetSignInButton();
    return;
  }

  var btn = document.getElementById('google-signin-btn');
  btn.innerHTML = '<div class="login-spinner"></div> Verifying…';

  // Get userinfo from Google using the access token
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { Authorization: 'Bearer ' + tokenResponse.access_token }
  })
  .then(function(r) { return r.json(); })
  .then(function(userinfo) {
    if (!userinfo.email) {
      showLoginError('Could not retrieve your account info. Please try again.');
      resetSignInButton();
      return;
    }
    verifyWithBackend(userinfo);
  })
  .catch(function() {
    showLoginError('Could not reach Google. Please check your connection.');
    resetSignInButton();
  });
}

function verifyWithBackend(userinfo) {
  fetch('/api/mongo', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: userinfo.email, name: userinfo.name, picture: userinfo.picture })
  })
  .then(function(r) { return r.json().then(function(d){ return {ok: r.ok, data: d}; }); })
  .then(function(res) {
    if (!res.ok || !res.data.success) {
      var msg = res.data.message || res.data.error || 'Access denied.';
      showLoginError(msg);
      resetSignInButton();
      return;
    }
    currentUser = res.data.user;
    showDashboard();
  })
  .catch(function(err) {
    console.error('Backend error:', err);
    showLoginError('Could not reach the server. Please check your connection and try again.');
    resetSignInButton();
  });
}

function showDashboard() {
  var loginScreen = document.getElementById('login-screen');
  var appEl = document.getElementById('app');

  loginScreen.style.opacity = '0';
  loginScreen.style.transition = 'opacity 0.25s ease';
  setTimeout(function() {
    loginScreen.style.display = 'none';
    appEl.style.display = 'flex';

    // Render instantly from localStorage cache if we have one — no TTL,
    // it lives until MongoDB actually has newer data
    var cached = getCachedSalesData();
    if (cached) {
      repsRaw   = cached.repsRaw;
      zonesRaw  = cached.zones || [];
      months26  = cached.months || months26;
      dataReady = true;
      render();
    } else {
      appEl.innerHTML = loadingScreen();
    }

    if (currentUser) {
      var ini = currentUser.name.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
      var roleLabel = currentUser.role.charAt(0).toUpperCase() + currentUser.role.slice(1);
      window._pendingUserPatch = { ini: ini, name: currentUser.name, role: roleLabel, photoUrl: currentUser.photoUrl };
      if (cached) patchSidebarUser(ini, currentUser.name, roleLabel, currentUser.photoUrl);
    }

    // Cheap check: has MongoDB data changed since our cache was built?
    checkForFreshData(cached, function(needsRefresh) {
      if (!needsRefresh) return; // cache is still current — skip the heavy fetch entirely

      fetchLiveData(function() {
        render();
        if (window._pendingUserPatch) {
          var p = window._pendingUserPatch;
          patchSidebarUser(p.ini, p.name, p.role, p.photoUrl);
        }
      });
    });
  }, 260);
}

// Lightweight check — just reads a timestamp, no aggregation cost
function checkForFreshData(cached, callback) {
  fetch('/api/mongo-batch?action=meta')
    .then(function(r){ return r.json(); })
    .then(function(meta){
      if (!cached) return callback(true); // no cache at all — must fetch
      if (!meta.lastUpdated) return callback(false); // no push recorded — trust cache
      var dbUpdatedAt = new Date(meta.lastUpdated).getTime();
      var cacheBuiltAt = cached._cachedAt || 0;
      callback(dbUpdatedAt > cacheBuiltAt); // refresh only if DB is newer than our cache
    })
    .catch(function(){
      // Meta check failed — fall back to using cache if we have one, else fetch
      callback(!cached);
    });
}

function getCachedSalesData() {
  try {
    var raw = localStorage.getItem('sar_sales_cache_' + CACHE_VERSION);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}

function setCachedSalesData(data) {
  try {
    data._cachedAt = Date.now();
    localStorage.setItem('sar_sales_cache_' + CACHE_VERSION, JSON.stringify(data));
  } catch (e) { /* storage full or unavailable — ignore */ }
}

  +'</div>';
  document.body.appendChild(ov);
}

function hideRefreshOverlay() {
  var ov = document.getElementById('refresh-overlay');
  if (ov) ov.remove();
}

function patchSidebarUser(initials, name, role, photoUrl) {
  // Called after render() builds the sidebar
  setTimeout(function() {
    var aside = document.querySelector('aside');
    if (!aside) return;
    // Update the bottom avatar + name in sidebar footer
    var footer = aside.querySelector('div[style*="border-top"]');
    if (footer) {
      var avatarEl = footer.querySelector('div[style*="border-radius:50%"]');
      if (avatarEl) {
        if (photoUrl) {
          avatarEl.innerHTML = '';
          avatarEl.style.overflow = 'hidden';
          avatarEl.style.padding = '0';
          avatarEl.innerHTML = '<img src="'+photoUrl+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />';
        } else {
          avatarEl.textContent = initials;
        }
      }
    }
    // Update the header name/role
    var header = aside.querySelector('div[style*="border-bottom"]');
    if (header) {
      var nameEl = header.querySelector('div[style*="font-size:13.5px"]');
      if (nameEl) nameEl.textContent = 'SAR_IN – Air';
      var roleEl = header.querySelector('div[style*="font-size:10.5px"]');
      if (roleEl) roleEl.textContent = name + ' · ' + role;
    }
  }, 50);
}

function showLoginError(msg) {
  var el = document.getElementById('login-error');
  if (el) { el.textContent = msg; el.classList.add('show'); }
}
function hideLoginError() {
  var el = document.getElementById('login-error');
  if (el) el.classList.remove('show');
}
function resetSignInButton() {
  var btn = document.getElementById('google-signin-btn');
  if (!btn) return;
  btn.disabled = false;
  btn.innerHTML = '<svg class="g-logo" width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg> Continue with Google';
}

/* ====================== DATA ====================== */
var months26 = ['Jan-26','Feb-26','Mar-26','Apr-26','May-26','Jun-26'];
var repsRaw  = [];
var zonesRaw = [];
var dataReady = false;
var customerData = null; // { topByShipments, topByRevenue, topByGP, topByGPPct, totalCustomers }
var customerDataReady = false;
var usageData = null; // { totalUsers, activeUsers, loggedIn7Day, users }
var usageDataReady = false;

function fetchLiveData(callback, force){
  fetch('/api/mongo-batch?action=sales' + (force ? '&force=1' : ''))
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data.repsRaw && data.repsRaw.length > 0) {
        repsRaw   = data.repsRaw;
        zonesRaw  = data.zones  || [];
        months26  = data.months || months26;
        dataReady = true;
        setCachedSalesData({ repsRaw: repsRaw, zones: zonesRaw, months: months26 });
        console.log('✅ Live data:', repsRaw.length, 'reps,', zonesRaw.length, 'zones');
      }
      if (callback) callback();
    })
    .catch(function(e){
      console.warn('⚠️ Live data failed, using static fallback:', e.message);
      // Static fallback so dashboard isn't empty
      repsRaw = [
        { name:'Harshvardhan Rawat',  zone:'Thailand', hue:255, gp:[2800,4200,5100,2900,1900,870],   ship:[12,20,22,18,10,14], tank:[0,0,0,0,0,0], tgt:8483 },
        { name:'Anchalee Dubey',      zone:'Thailand', hue:215, gp:[541,736,2187,1762,1617,1483],    ship:[4,5,14,8,8,3],      tank:[0,0,3,0,0,0], tgt:0 },
        { name:'Priya Lekha',         zone:'India',    hue:165, gp:[1800,3600,3200,1900,900,1200],   ship:[8,16,18,14,5,6],    tank:[0,0,0,0,0,0], tgt:8483 },
        { name:'Manoj Pant',          zone:'India',    hue:145, gp:[2865,1942,1997,2145,622,186],    ship:[7,9,3,13,3,2],      tank:[0,0,0,0,0,0], tgt:22450 }

}

var state = { page:'sales', currency:'USD', reportView:'Monthly', viewDropOpen:false, dateFrom:'Jan-26', dateTo:'Jun-26', rate:32.50, rateEditing:false, feedbackOpen:false, feedbackText:'', feedbackReport:'Sales Performance Dashboard', feedbackError:'', feedbackSent:false, shipOpen:{}, drill:null };

/* ====================== HELPERS ====================== */
function fmtCur(v){
  var rate = state.currency==='THB'?32.5:1;
  var sym = state.currency==='THB'?'\u0E3F':'$';
  return sym + Math.round(v*rate).toLocaleString('en-US');
}
function initials(name){return name.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}
function sum(a){return a.reduce(function(x,y){return x+y;},0);}
function sparkOf(arr){
  var max=Math.max.apply(null,arr), min=Math.min.apply(null,arr);
  var W=104,H=30,pad=4;
  return arr.map(function(v,i){
    var x=pad+i*((W-2*pad)/(arr.length-1));
    var y=(H-pad)-((v-min)/((max-min)||1))*(H-2*pad);
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
}
function heat(ratio){
  if(ratio>=1.05)return{bg:'#CFEBDD',color:'#0E6B45'};
  if(ratio>=0.85)return{bg:'#E3F5EA',color:'#15875A'};
  if(ratio>=0.6)return{bg:'#FBF1DA',color:'#946312'};
  if(ratio>=0.35)return{bg:'#FBE6D2',color:'#A85B17'};
  if(ratio>0)return{bg:'#FBDED9',color:'#B83A2B'};
  return{bg:'transparent',color:'#C7CEDA'};
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

/* ====================== DERIVED MODEL ====================== */
function model(){
  var gpGrand   = sum(repsRaw.map(function(r){return sum(r.gp);}));
  var shipGrand = sum(repsRaw.map(function(r){return sum(r.ship);}));
  var tonsGrand = sum(repsRaw.map(function(r){return sum(r.tons||[]);}));
  // Target rolls up from Zone targets (reps have no individual targets)
  var tgtGrand  = sum(zonesRaw.map(function(z){return (z.monthlyTarget||0) * months26.length;}));
  var achGrand  = tgtGrand > 0 ? Math.round(gpGrand / tgtGrand * 100) : 0;
  var teusGrand = sum(repsRaw.map(function(r){return sum(r.ship.map(function(s){return Math.round(s*2.6);}));}));
  return {gpGrand:gpGrand, shipGrand:shipGrand, tonsGrand:tonsGrand, tgtGrand:tgtGrand, achGrand:achGrand, teusGrand:teusGrand};
}

function grandEntity(){
  var n = months26.length;
  return {
    name:'Grand Total', initials:'GT', avatarBg:'oklch(0.5 0.14 262)', isGrand:true, zone:'',
    ship: months26.map(function(_,i){return sum(repsRaw.map(function(r){return r.ship[i]||0;}));}),
    gp:   months26.map(function(_,i){return sum(repsRaw.map(function(r){return r.gp[i]  ||0;}));}),
    tons: months26.map(function(_,i){return sum(repsRaw.map(function(r){return (r.tons&&r.tons[i])||0;}));}),
    tank: months26.map(function(){return 0;}),
    tgt:  sum(zonesRaw.map(function(z){return z.monthlyTarget||0;}))
  };
}

// Returns unique zones in order
function getZones(){
  var seen = {}, zones = [];
  repsRaw.forEach(function(r){
    if (!seen[r.zone]) { seen[r.zone] = true; zones.push(r.zone); }
  });
  return zones;
}

// Zone-level aggregate entity
function zoneEntity(zoneName){
  var zReps = repsRaw.filter(function(r){ return r.zone === zoneName; });
  var zData = zonesRaw.find(function(z){ return z.zone === zoneName; }) || {};
  return {
    name: zoneName, initials: zoneName.slice(0,2).toUpperCase(),
    avatarBg: 'oklch(0.5 0.14 ' + zoneHue(zoneName) + ')',
    isZone: true, zone: zoneName,
    ship: months26.map(function(_,i){ return sum(zReps.map(function(r){ return r.ship[i]||0; })); }),
    gp:   months26.map(function(_,i){ return sum(zReps.map(function(r){ return r.gp[i]  ||0; })); }),
    tons: months26.map(function(_,i){ return sum(zReps.map(function(r){ return (r.tons&&r.tons[i])||0; })); }),
    tank: months26.map(function(){ return 0; }),
    tgt:  zData.monthlyTarget || sum(zReps.map(function(r){ return r.tgt; }))
  };
}

function zoneHue(zone){
  var h = 0;
  for (var i = 0; i < zone.length; i++) h = (h * 31 + zone.charCodeAt(i)) & 0xffff;
  return h % 360;
}

function repEntity(r){
  return {
    name: r.name, initials: initials(r.name),
    avatarBg: 'oklch(0.6 0.12 ' + r.hue + ')',
    isRep: true, zone: r.zone,
    ship: r.ship, gp: r.gp, tons: r.tons || months26.map(function(){return 0;}), tank: r.tank, tgt: r.tgt
  };
}

function entities(){
  // Grand Total + Zone groups + Reps within each zone
  var list = [grandEntity()];
  getZones().forEach(function(z){
    list.push(zoneEntity(z));
    repsRaw.filter(function(r){ return r.zone === z; }).forEach(function(r){
      list.push(repEntity(r));
    });
  });
  return list;
}

/* ====================== DRILL-DOWN ====================== */
function genShipments(entity, metric, col){
  var routes=[['Bangkok','Los Angeles'],['Laem Chabang','Rotterdam'],['Bangkok','Hamburg'],['Map Ta Phut','Singapore'],['Bangkok','Jebel Ali'],['Laem Chabang','Shanghai'],['Bangkok','Sydney'],['Laem Chabang','Long Beach']];
  var modes=[{n:'FCL',c:'#2F6FED',b:'#EAF1FE'},{n:'LCL',c:'#138A6E',b:'#E3F4EF'},{n:'Air',c:'#7A4FC0',b:'#F1ECFB'},{n:'Tank',c:'#B26AC9',b:'#F7ECFB'}];
  var stats=[{n:'Delivered',c:'#15875A'},{n:'In transit',c:'#2F6FED'},{n:'Customs hold',c:'#C7891E'}];
  // Get real GP total for this entity+col
  var repData = repsRaw.find(function(r){ return r.name===entity; });
  var monthIdx = months26.indexOf(col);
  var totalGP = 0;
  if(repData && monthIdx>=0){ totalGP = repData.gp[monthIdx]; }
  else if(entity==='Grand Total' && monthIdx>=0){ totalGP = sum(repsRaw.map(function(r){ return r.gp[monthIdx]; })); }
  else if(repData){ totalGP = sum(repData.gp); } // FY Total
  else { totalGP = sum(repsRaw.map(function(r){ return sum(r.gp); })); }
  // Generate shipments that sum to real GP
  var seed=0, key=entity+col;
  for(var i=0;i<key.length;i++) seed=(seed*31+key.charCodeAt(i))>>>0;
  function rnd(){seed=(seed*1664525+1013904223)>>>0;return seed/4294967296;}
  var shipCount = repData ? (monthIdx>=0 ? repData.ship[monthIdx] : sum(repData.ship)) : (monthIdx>=0 ? sum(repsRaw.map(function(r){return r.ship[monthIdx];})) : sum(repsRaw.map(function(r){return sum(r.ship);})));
  var n = Math.max(1, Math.min(shipCount, 8));
  var out=[], remaining=totalGP;
  for(var j=0;j<n;j++){
    var r=routes[Math.floor(rnd()*routes.length)];
    var m=modes[Math.floor(rnd()*modes.length)];
    var s=stats[Math.floor(rnd()*stats.length)];
    var teus=1+Math.floor(rnd()*3);
    var gpRaw = j===n-1 ? Math.max(0,remaining) : Math.round(remaining*(0.1+rnd()*0.4));
    remaining -= gpRaw;
    out.push({jobNo:'SAR-26-'+(10000+Math.floor(rnd()*89999)), origin:r[0], dest:r[1], mode:m.n, modeColor:m.c, modeBg:m.b, teus:teus+' TEU', gpRaw:gpRaw, gpFmt:fmtCur(gpRaw), status:s.n, statusColor:s.c});
  }
  return out;
}

/* ====================== USAGE ANALYTICS ====================== */
function usageKpiCard(value, label, color){
  return '<div style="background:#FFFFFF;border:1px solid #E7ECF3;border-radius:10px;padding:22px;text-align:center;">'
    +'<div style="font-family:\'DM Mono\',monospace;font-size:34px;font-weight:800;color:'+color+';line-height:1;margin-bottom:6px;">'+value+'</div>'
    +'<div style="font-size:11px;font-weight:600;letter-spacing:0.04em;color:#64748B;text-transform:uppercase;">'+label+'</div>'
  +'</div>';
}

function roleBadge(role){
  var r = String(role||'').toLowerCase();
  var bg = '#EAF1FE', color = '#2563EB';
  if (r.indexOf('regional') >= 0) { bg = '#FEF3E2'; color = '#C26A12'; }
  else if (r.indexOf('sales') >= 0) { bg = '#F1F5F9'; color = '#475569'; }
  else if (r.indexOf('admin') >= 0) { bg = '#EAF1FE'; color = '#2563EB'; }
  return '<span style="background:'+bg+';color:'+color+';font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:5px;white-space:nowrap;">'+esc(role)+'</span>';
}

function fmtLastLogin(iso){
  if (!iso) return '—';
  var d = new Date(iso);
  var dd = String(d.getDate()).padStart(2,'0');
  var mm = String(d.getMonth()+1).padStart(2,'0');
  var yyyy = d.getFullYear();
  var hh = String(d.getHours()).padStart(2,'0');
  var min = String(d.getMinutes()).padStart(2,'0');
  return dd+'/'+mm+'/'+yyyy+', '+hh+':'+min;
}

function buildSummaryCells(e, colLabels){
  var gpSeries=[sum(e.gp)].concat(e.gp);
  return gpSeries.map(function(v,i){
    var isFY=i===0, dash=!v;
    return {
      val:dash?'\u2014':fmtCur(v),
      color:dash?'#C7CEDA':'#059669',
      bg:isFY?'#FFFBF0':'transparent',
      borderLeft:isFY?'2px solid #F0D9A8':'0',
      weight:isFY?700:600,
      entity:e.name, metric:'Gross Profit', col:colLabels[i], drillVal:dash?fmtCur(0):fmtCur(v)
    };
  });
}
function buildCells(fy, monthVals, type, baseColor, entityName, metricLabel, colLabels, noTarget){
  var series=[fy].concat(monthVals);
  return series.map(function(v,i){
    var val, color=baseColor, isDash=false;
    if(noTarget && (type==='pct' || (type==='cur' && metricLabel==='Target'))){
      val='\u2014'; isDash=true;
    }
    else if(type==='int'){ if(v){val=v.toLocaleString('en-US');}else{val='\u2014';isDash=true;} }
    else if(type==='cur'){ val=fmtCur(v); }
    else if(type==='pct'){ val=v+'%'; color=v>=100?'#15875A':'#D64545'; }
    else if(type==='tons'){ if(v){val=v.toFixed(2)+' t';}else{val='\u2014';isDash=true;} }
    else { val='\u2014'; isDash=true; }
    if(isDash) color='#C7CEDA';
    var isFY=i===0;
    return {val:val, color:color, bg:isFY?'#FFFBF0':'transparent', borderLeft:isFY?'2px solid #F0D9A8':'0', weight:isFY?600:500, entity:entityName, metric:metricLabel, col:colLabels[i], drillVal:val};
  });
}

function tableRows(){
  var colLabels = ['FY Total'].concat(months26);
  var ents = entities();
  var rows = [];

  ents.forEach(function(e){
    var isGrand = e.isGrand;
    var isZone  = e.isZone;
    var isRep   = e.isRep;
    var shipOpen = state.shipOpen[e.name] === true;

    var achFy = e.tgt > 0 ? Math.round(sum(e.gp) / (e.tgt * months26.length) * 100) : 0;

    // Zone-level background
    var groupBg = isGrand ? '#F1F6FF' : isZone ? '#F8F4FF' : '#FCFDFF';
    var avatarBg = e.avatarBg;

    var teus    = e.ship.map(function(s){ return Math.round(s*2.6); });
    var lcl     = months26.map(function(){ return 0; });
    var tgtArr  = months26.map(function(){ return e.tgt; });
    var achArr  = months26.map(function(_,i){ return e.tgt ? Math.round(e.gp[i]/e.tgt*100) : 0; });

    function metric(label, indent, type, color, vals, fy, toggleType, repInfo){
      var isShip = toggleType === 'ship';
      var isOpen = isShip ? shipOpen : false;
      var arrowChar = isShip ? (isOpen ? '◄ ' : '► ') : '';
      // Individual reps have no real target data — show dash for Target/Achievement rows
      var noTarget = isRep && (label === 'Target' || label === 'Achievement %');
      return {
        type:'metric', label:label, padLeft:(52+indent*18)+'px', labelColor:color,
        labelWeight:indent?500:600, labelStyle:indent?'italic':'normal',
        caret:arrowChar, toggleType:toggleType||false, entityName:e.name,
        repInfo:repInfo||null,
        cells:buildCells(fy, vals, type, color, e.name, label, colLabels, noTarget)
      };
    }

    var nameWeight = isGrand ? 700 : isZone ? 700 : 600;
    var barColor   = achFy>=100?'#15875A':achFy<50?'#E08A2B':'#2F6FED';
    var achColor   = achFy>=100?'#15875A':achFy<50?'#C26A12':'#2F6FED';

    var repInfo = {
      name: e.name, initials: e.initials, avatarBg: avatarBg,
      nameWeight: nameWeight, groupBg: groupBg,
      achFmt: e.tgt>0 ? achFy+'%' : '—',
      barWidth: Math.min(100,achFy)+'%',
      barColor: barColor, achColor: achColor,
      isZone: isZone, isGrand: isGrand
    };

    rows.push(metric('Shipments', 0, 'int', '#15233B', e.ship, sum(e.ship), 'ship', repInfo));

    if (shipOpen) {
      rows.push(metric('Tons (Air)',         1, 'tons', '#5B8DEF', e.tons, sum(e.tons), false));
      rows.push(metric('TEUs (Ocean)',       1, 'int',  '#5B8DEF', teus, sum(teus), false));
      rows.push(metric('LCL (Ocean in CBM)', 1, 'dash', '#9AA4B2', lcl, 0, false));
    }

    rows.push(metric('GP',            0, 'cur', '#374151', e.gp,    sum(e.gp),              false));
    rows.push(metric('Target',        0, 'cur', '#374151', tgtArr,  e.tgt * months26.length, false));
    rows.push(metric('Achievement %', 0, 'pct', '#374151', achArr,  achFy,                   false));
  });

  return rows;
}

function leaderboard(){
  var M = model();
  // Sort reps by GP total descending
  var sorted = repsRaw.map(function(r){
    var gpTotal = sum(r.gp);
    var shipTotal = sum(r.ship);
    var tgtTotal = r.tgt * 6;
    var ach = tgtTotal > 0 ? gpTotal / tgtTotal : 0;
    var achPct = Math.round(ach * 100);
    var last = r.gp[5], prev = r.gp[4];
    var momPct = prev ? Math.round((last - prev) / prev * 100) : 0;
    var trend = last > prev ? 'up' : last < prev ? 'down' : 'flat';
    return { name:r.name, hue:r.hue, gpTotal:gpTotal, shipTotal:shipTotal,
      tgtTotal:tgtTotal, achPct:achPct, ach:ach, momPct:momPct, trend:trend,
      gp:r.gp, tgt:r.tgt };
  }).sort(function(a,b){ return b.gpTotal - a.gpTotal; });

  var medals = ['🥇','🥈','🥉'];

  // Sparkline helper
  function spark(arr, color){
    var max=Math.max.apply(null,arr), min=Math.min.apply(null,arr);
    var W=80, H=24, pad=2;
    var pts = arr.map(function(v,i){
      var x = pad + i*((W-2*pad)/(arr.length-1));
      var y = (H-pad) - ((v-min)/((max-min)||1))*(H-2*pad);
      return x.toFixed(1)+','+y.toFixed(1);
    }).join(' ');
    return '<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="overflow:visible;">'
      +'<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
      +'</svg>';
  }

  // Top 3 podium
  var podium = '';
  if(sorted.length >= 3){
    var order = [sorted[1], sorted[0], sorted[2]]; // 2nd, 1st, 3rd
    var heights = ['80px','110px','60px'];
    var podColors = ['#94A3B8','#F59E0B','#CD7C3A'];

        +'<div style="text-align:center;">'
          +'<div style="font-size:12px;font-weight:700;color:#15233B;white-space:nowrap;">'+r.name.split(' ')[0]+'</div>'
          +'<div style="font-family:\'DM Mono\',monospace;font-size:13px;font-weight:700;color:'+podColors[idx]+';">'+fmtCur(r.gpTotal)+'</div>'
        +'</div>'
        +'<div style="width:100%;height:'+heights[idx]+';background:'+podColors[idx]+';border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;">'

    var ini = r.name.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
    var trendColor = r.trend==='up'?'#15875A':r.trend==='down'?'#DC2626':'#94A3B8';

function render(){
  var M=model();
  var app=document.getElementById('app');
  // Only rebuild sidebar on first load — avoids sidebar scroll jump
  if(!app.querySelector('aside')){
    app.innerHTML=sidebar()+'<div id="main-col" style="flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden;"><div id="topbar-slot"></div><main id="main-slot" style="flex:1;overflow-y:auto;padding:10px 14px 20px;"></main></div><div id="drawer-slot"></div>';
  }
  var mainEl=document.getElementById('main-slot');
  var scrollTop=mainEl?mainEl.scrollTop:0;
  // Update only topbar, main content, drawer — sidebar untouched
  document.getElementById('topbar-slot').innerHTML=topbar();
  mainEl.innerHTML = state.page==='customers' ? customerPage()
    : state.page==='usage' ? usagePage()
    : kpiRow(M)+(state.page==='leaderboard'?leaderboard():salesTable(M));
  document.getElementById('drawer-slot').innerHTML=drawer()+feedbackModal();
  if(scrollTop) mainEl.scrollTop=scrollTop;
}
function renderKeepTopbar(){
  // Re-render everything EXCEPT topbar — used when date inputs change
  // so the native date picker doesn't get destroyed mid-interaction
  var M=model();
  var mainEl=document.getElementById('main-slot');
  var scrollTop=mainEl?mainEl.scrollTop:0;
  if(mainEl) mainEl.innerHTML = state.page==='customers' ? customerPage()
    : state.page==='usage' ? usagePage()
    : kpiRow(M)+(state.page==='leaderboard'?leaderboard():salesTable(M));
  var drawerEl=document.getElementById('drawer-slot');
  if(drawerEl) drawerEl.innerHTML=drawer()+feedbackModal();
  if(scrollTop) mainEl.scrollTop=scrollTop;
}

function openDrill(entity, metric, col, valueFmt){
  var ships=genShipments(entity,metric,col);
  var total=sum(ships.map(function(s){return s.gpRaw;}));
  state.drill={entity:entity, metric:metric, col:col, valueFmt:valueFmt, shipments:ships, totalFmt:fmtCur(total), count:ships.length};

}

document.addEventListener('change', function(ev){
  var el=ev.target;
  if(el.getAttribute('data-act')==='setFrom'){ ev.stopPropagation(); state.dateFrom=el.value; renderKeepTopbar(); }
  else if(el.getAttribute('data-act')==='setTo'){ ev.stopPropagation(); state.dateTo=el.value; renderKeepTopbar(); }
  else if(el.getAttribute('data-act')==='rateCommit'){ var v=parseFloat(el.value); if(!isNaN(v)&&v>0) state.rate=v; state.rateEditing=false; render(); }
});
document.addEventListener('click', function(ev){
  var el = ev.target.closest('[data-act]');
  if(!el) return;

  // Overlay close buttons (feedbackClose, drawer backdrop, etc.) use
  // event delegation on a full-screen wrapper div. If the actual click
  // landed on an inner form control (select/textarea/input) inside the
  // [data-stop] modal box, closest('[data-act]') would otherwise walk
  // up to that wrapper and incorrectly trigger close. Guard against it:
  var stopEl = ev.target.closest('[data-stop]');
  if(stopEl && el.getAttribute('data-act')==='feedbackClose' && ev.target !== el){
    return; // click was inside the modal box, not on the close button/overlay itself
  }

  var act=el.getAttribute('data-act');
  if(act==='page'){
    ev.stopPropagation(); ev.preventDefault();
    state.page=el.getAttribute('data-val');
    render();
    if(state.page==='customers' && !customerDataReady){
      fetchCustomerData(function(){ render(); });
    }
    if(state.page==='usage' && !usageDataReady){
      fetchUsageData(function(){ render(); });
    }
  }
  else if(act==='refreshData'){
    ev.stopPropagation();
    var btn = document.getElementById('refresh-btn');
    var icon = document.getElementById('refresh-icon');
    if(btn) btn.disabled = true;
    if(icon){ icon.style.animation = 'spin 0.8s linear infinite'; }
    showRefreshOverlay();

    function finishRefresh(){
      if(btn) btn.disabled = false;
      if(icon){ icon.style.animation = ''; }
      hideRefreshOverlay();
      render();
    }

    // Force a fresh fetch regardless of page — always refresh sales data,
    // plus customer/usage data if those pages have already been loaded once.
    var pending = 1;
    function done(){ pending--; if(pending<=0) finishRefresh(); }

    fetchLiveData(done, true);
    if(customerDataReady){ pending++; fetchCustomerData(done, true); }
    if(usageDataReady){ pending++; fetchUsageData(done, true); }
  }
  else if(act==='rateEdit'){ state.rateEditing=true; render(); setTimeout(function(){ var inp=document.getElementById('rate-input'); if(inp) inp.focus(); },50); }
  else if(act==='rateCommit'){ var v=parseFloat(document.getElementById('rate-input').value); if(!isNaN(v)&&v>0) state.rate=v; state.rateEditing=false; render(); }
  else if(act==='feedbackOpen'){ ev.stopPropagation(); state.feedbackOpen=true; state.feedbackSent=false; state.feedbackText=''; render(); }
  else if(act==='feedbackClose'){
    if(ev.target.closest('[data-stop]')&&!el.matches('[data-act="feedbackClose"]')) return;
    state.feedbackOpen=false;
    state.feedbackSent=false;
    state.feedbackText='';
    state.feedbackError='';
    state.feedbackReport='Sales Performance Dashboard';
    render();
  }
  else if(act==='feedbackSubmit'){
    ev.stopPropagation();
    var ta=document.getElementById('feedback-text');
    var sel=document.getElementById('feedback-report');
    var txt = ta ? ta.value.trim() : '';
    var report = sel ? sel.value : '';
    if(!report){ state.feedbackError='Please select a report.'; render(); return; }
    if(!txt){ state.feedbackError='Please describe your feedback.'; render(); return; }
    state.feedbackText=txt;
    state.feedbackReport=report;
    state.feedbackError='';
    state.feedbackSent=true;
    render();
  }
  else if(act==='toggleViewDrop'){ ev.stopPropagation(); state.viewDropOpen=!state.viewDropOpen; render(); }
  else if(act==='setView'){ ev.stopPropagation(); state.reportView=el.getAttribute('data-val'); state.viewDropOpen=false; render(); }
  else if(act==='cur'){ ev.stopPropagation(); ev.preventDefault(); state.currency=el.getAttribute('data-cur'); render(); }
  else if(act==='shipToggle'){ ev.stopPropagation(); var n=el.getAttribute('data-name'); state.shipOpen[n]=!state.shipOpen[n]; render(); }
  else if(act==='drill'){ ev.stopPropagation(); openDrill(el.getAttribute('data-entity'),el.getAttribute('data-metric'),el.getAttribute('data-col'),el.getAttribute('data-val')); }
  else if(act==='close'){ if(ev.target.closest('[data-stop]') && !el.matches('[data-act="close"]')) return; state.drill=null; render(); }
});
document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ if(state.viewDropOpen){ state.viewDropOpen=false; render(); } else if(state.drill){ state.drill=null; render(); } } });
document.addEventListener('click', function(e){ if(state.viewDropOpen && !e.target.closest('[data-act="toggleViewDrop"]') && !e.target.closest('[data-act="setView"]')){ state.viewDropOpen=false; render(); } }, true);

window.addEventListener('load', function() {
  var interval = setInterval(function() {
    if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
      clearInterval(interval);
      initGoogleAuth();
    }
  }, 100);
});
